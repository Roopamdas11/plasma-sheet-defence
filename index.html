<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Plasma Defence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#04020f;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Orbitron',sans-serif}
#canvas{display:block;position:fixed;top:0;left:0;width:100vw;height:100vh;touch-action:none}
.ov{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:12px}
.hidden{display:none!important}
#overlay{background:rgba(4,2,15,.96);z-index:12}
.ov-title{font-size:clamp(1.5rem,6.5vw,3rem);font-weight:900;letter-spacing:4px;color:var(--accent,#00e5ff);text-transform:uppercase;margin-bottom:8px;text-align:center;text-shadow:0 0 28px var(--accent-glow,rgba(0,229,255,.8))}
.ov-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(.62rem,2vw,.88rem);color:#7eb8cc;text-align:center;max-width:360px;line-height:1.9;margin-bottom:18px}
.ov-sub b{color:var(--accent,#00e5ff)}
.big-btn{background:transparent;color:var(--accent,#00e5ff);border:1.5px solid var(--accent,#00e5ff);padding:13px 44px;font-size:.9rem;font-family:var(--hud-font,'Orbitron,sans-serif');letter-spacing:3px;text-transform:uppercase;cursor:pointer;box-shadow:0 0 16px var(--accent-glow,rgba(0,229,255,.3));transition:all .15s;margin:4px}
.big-btn:hover{background:rgba(var(--accent-rgb,0,229,255),.1);transform:scale(1.04)}
.big-btn:active{transform:scale(.97)}
#hs-list{font-family:'Share Tech Mono',monospace;color:#7eb8cc;font-size:clamp(.58rem,1.9vw,.76rem);margin:6px 0 12px;line-height:1.8;text-align:center}
#hs-list .hs-new{color:#00ff99;font-weight:bold}
#share-btn{margin-top:4px;background:transparent;color:#00ff99;border:1.5px solid #00ff99;padding:8px 24px;font-size:.75rem;font-family:'Orbitron',sans-serif;letter-spacing:3px;cursor:pointer;transition:all .15s}
#share-btn:hover{background:rgba(0,255,153,.1)}
#upgrade-overlay{background:rgba(2,0,14,.94);z-index:11;gap:16px}
.upg-title{font-size:clamp(.85rem,3.5vw,1.4rem);font-weight:900;letter-spacing:4px;color:#00ff99;text-transform:uppercase;text-align:center;text-shadow:0 0 16px rgba(0,255,153,.7)}
.upg-sub{font-family:'Share Tech Mono',monospace;color:#5fbfa0;font-size:clamp(.58rem,1.8vw,.78rem);letter-spacing:2px}
.upg-cards{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:0 12px;max-width:600px}
.upg-card{background:rgba(0,16,26,.94);border:1.5px solid rgba(0,229,255,.42);padding:14px 10px;min-width:100px;max-width:150px;flex:1;cursor:pointer;pointer-events:all;text-align:center;transition:transform .12s,border-color .12s,box-shadow .12s}
.upg-card:hover{border-color:var(--accent,#00e5ff);box-shadow:0 0 20px rgba(var(--accent-rgb,0,229,255),.45);transform:translateY(-3px)}
.upg-card:active{transform:scale(.95)}
.upg-card .ci{font-size:1.5rem;margin-bottom:6px}
.upg-card .cn{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;font-weight:700;color:var(--accent,#00e5ff)}
.upg-card .cd{font-size:.55rem;opacity:.6;margin-top:3px;color:#aad8e8;font-family:'Share Tech Mono',monospace}
#pause-overlay{background:rgba(4,2,15,.94);z-index:11;gap:6px}
.menu-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;margin:0}
.menu-section-label{color:rgba(0,229,255,.38);font-size:.52rem;letter-spacing:3px;font-family:'Orbitron',sans-serif;text-transform:uppercase;text-align:center;margin-top:8px;margin-bottom:1px}
.menu-label{color:rgba(0,229,255,.5);font-size:.6rem;letter-spacing:2px;font-family:'Orbitron',sans-serif;text-transform:uppercase;white-space:nowrap}
.menu-tog{background:none;border:1.5px solid rgba(0,229,255,.3);color:rgba(0,229,255,.65);padding:8px 14px;font-family:'Orbitron',sans-serif;font-size:.65rem;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .1s;min-height:40px}
.menu-tog.compact{padding:7px 12px;font-size:.6rem;min-height:36px}
.menu-tog.on{border-color:var(--accent,#00e5ff);color:var(--accent,#00e5ff);box-shadow:0 0 7px rgba(var(--accent-rgb,0,229,255),.22)}
.menu-tog.danger{border-color:rgba(255,60,60,.4);color:rgba(255,100,100,.75)}
/* Difficulty buttons */
.diff-btn{background:none;border:1.5px solid rgba(0,229,255,.3);color:rgba(0,229,255,.55);padding:9px 16px;font-family:'Orbitron',sans-serif;font-size:.65rem;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .12s;min-height:44px}
.diff-btn.active-easy  {border-color:#00ff99;color:#00ff99;box-shadow:0 0 8px rgba(0,255,153,.3)}
.diff-btn.active-medium{border-color:var(--accent,#00e5ff);color:var(--accent,#00e5ff);box-shadow:0 0 8px rgba(var(--accent-rgb,0,229,255),.3)}
.diff-btn.active-hard  {border-color:#ff4444;color:#ff4444;box-shadow:0 0 8px rgba(255,68,68,.35)}
/* Difficulty toast */
#diff-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(4,2,22,.92);border:1.5px solid var(--accent,#00e5ff);color:var(--accent,#00e5ff);font-family:'Orbitron',sans-serif;font-size:.7rem;letter-spacing:2px;padding:10px 20px;z-index:20;pointer-events:none;text-align:center;transition:opacity .35s;white-space:nowrap}
/* Upgrade pill — top-center bright banner */
#upgrade-pill{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9;display:flex;align-items:center;gap:8px;background:rgba(0,18,10,.92);border:2px solid #00ff99;border-radius:40px;padding:9px 22px;cursor:pointer;pointer-events:all;box-shadow:0 0 22px rgba(0,255,153,.55),0 0 6px rgba(0,255,153,.3) inset;animation:pillPulse 1.2s infinite}
#upgrade-pill-text{font-family:'Orbitron',sans-serif;font-size:clamp(.7rem,2.2vw,.88rem);font-weight:700;color:#00ff99;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;text-shadow:0 0 10px rgba(0,255,153,.8)}
@keyframes pillPulse{0%,100%{box-shadow:0 0 18px rgba(0,255,153,.5),0 0 6px rgba(0,255,153,.25) inset}50%{box-shadow:0 0 32px rgba(0,255,153,.85),0 0 10px rgba(0,255,153,.45) inset}}
/* ── Landing page poster ────────────────────────────────────── */
#landing-poster{position:absolute;inset:0;background:url('assets/poster.png') center/cover no-repeat;z-index:0}
#landing-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;width:100%;padding-bottom:60px;min-height:100%;background:linear-gradient(to top,rgba(4,2,15,.92) 0%,rgba(4,2,15,.55) 45%,transparent 75%)}
#overlay{padding:0;align-items:stretch;justify-content:stretch}
#overlay .ov-title{text-shadow:0 0 32px rgba(0,229,255,.9),0 2px 4px rgba(0,0,0,.8)}
#overlay .ov-sub{color:rgba(200,230,255,.85);text-shadow:0 1px 3px rgba(0,0,0,.9)}

/* ── Help button ────────────────────────────────────────────── */
#help-btn{position:fixed;top:64px;right:14px;width:36px;height:36px;border-radius:50%;background:rgba(4,2,15,.8);border:1.5px solid rgba(0,229,255,.4);color:rgba(0,229,255,.85);font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;pointer-events:all;z-index:5;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}

/* ── Tutorial glass overlay ─────────────────────────────────── */
#tutorial-overlay{position:fixed;inset:0;z-index:30;background:rgba(2,0,14,.45);pointer-events:none}
#tutorial-overlay:not(.hidden){display:block}
#tutorial-overlay.hidden{display:none}
.tut-glass{position:absolute;background:rgba(4,10,30,.72);border:1.5px solid rgba(0,229,255,.35);border-radius:10px;backdrop-filter:blur(8px);padding:10px 14px;pointer-events:none;max-width:170px}
.tut-glass-title{font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:900;letter-spacing:3px;color:#00e5ff;text-transform:uppercase;margin-bottom:3px}
.tut-glass-sub{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:rgba(160,210,235,.75);letter-spacing:1px}
.tut-glass-icon{font-size:1.3rem;margin-bottom:3px}
.tut-glass-label{font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;color:#00e5ff;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.tut-glass-desc{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:rgba(160,210,235,.8);line-height:1.4}
/* Positioned panels */
.tut-top-center{top:52px;left:50%;transform:translateX(-50%);text-align:center;max-width:220px}
.tut-bottom-left{bottom:160px;left:14px}
.tut-bottom-right{bottom:160px;right:14px;text-align:right}
.tut-center{top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.tut-top-right{top:14px;right:68px;padding:6px 10px}
.tut-top-pill{top:50px;left:50%;transform:translateX(-50%);text-align:center;max-width:220px}
/* Skip button */
#tut-skip-btn{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);pointer-events:all;background:rgba(0,229,255,.15);border:2px solid #00e5ff;border-radius:8px;color:#00e5ff;font-family:'Orbitron',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:3px;padding:13px 36px;cursor:pointer;white-space:nowrap;box-shadow:0 0 20px rgba(0,229,255,.3);-webkit-tap-highlight-color:transparent}
#tut-skip-btn:active{background:rgba(0,229,255,.3)}

/* ── Upgrade grid overlay ───────────────────────────────────── */
.upg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;width:100%;max-width:480px;max-height:55vh;overflow-y:auto;padding:4px 2px}
.upg-card2{display:flex;align-items:center;gap:10px;background:rgba(0,16,34,.82);border:1.5px solid rgba(0,229,255,.22);border-radius:8px;padding:8px 10px;cursor:pointer;transition:border-color .12s,transform .1s,opacity .1s;-webkit-tap-highlight-color:transparent;position:relative}
.upg-card2:not(.upg-maxed):active{transform:scale(.96)}
.upg-card2:not(.upg-maxed):hover{border-color:rgba(0,229,255,.55)}
.upg-maxed{opacity:.45;cursor:default}
.upg-c2-icon{font-size:1.4rem;flex-shrink:0;line-height:1;width:28px;text-align:center}
.upg-c2-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.upg-c2-name{font-family:'Orbitron',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upg-c2-desc{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:rgba(160,210,235,.75);line-height:1.25}
.upg-c2-pips{display:flex;gap:2px;margin-top:2px}
.upg-pip{width:7px;height:7px;border-radius:2px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2)}
.upg-pip-on{background:currentColor;border-color:currentColor;box-shadow:0 0 4px currentColor}
.upg-c2-badge{position:absolute;top:4px;right:6px;font-family:'Orbitron',sans-serif;font-size:.5rem;font-weight:700;letter-spacing:1px;opacity:.7}
#upg-tokens-label{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:#00ff99;letter-spacing:2px;margin-bottom:4px}
#upg-done-btn{margin-top:8px}
#boss-banner{position:fixed;top:15%;left:50%;transform:translateX(-50%);z-index:13;font-family:'Orbitron',sans-serif;font-size:clamp(.85rem,3.8vw,1.6rem);font-weight:900;letter-spacing:6px;color:#ff3333;text-transform:uppercase;text-shadow:0 0 16px rgba(255,50,50,.9);pointer-events:none;animation:bFlash .45s infinite}
@keyframes bFlash{0%,100%{opacity:1}50%{opacity:.4}}
#loading-screen{position:fixed;inset:0;background:#04020f;display:flex;align-items:center;justify-content:center;z-index:100;font-family:'Orbitron',sans-serif;color:#00e5ff;font-size:clamp(.8rem,3vw,1.2rem);letter-spacing:3px;flex-direction:column;gap:12px}
#loading-bar{width:200px;height:3px;background:rgba(0,229,255,.15);position:relative;overflow:hidden}
#loading-bar::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:#00e5ff;animation:loadSlide 1.2s ease-in-out infinite}
@keyframes loadSlide{to{left:200%}}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="loading-screen">
  <div>LOADING…</div>
  <div id="loading-bar"></div>
</div>

<div id="overlay" class="ov hidden">
  <div id="landing-poster"></div>
  <div id="landing-content">
    <div class="ov-title" id="main-title">Plasma<br>Defence</div>
    <div class="ov-sub" id="main-sub">Defend the tower · survive as long as you can</div>
    <div id="hs-list"></div>
    <button class="big-btn" id="play-btn">⚡ ENGAGE</button>
    <button id="share-btn" class="hidden">📤 SHARE SCORE</button>
    <div style="font-family:'Share Tech Mono',monospace;font-size:.55rem;color:rgba(0,229,255,.28);letter-spacing:2px;margin-top:14px;text-transform:uppercase">Made by Roopam</div>
  </div>
</div>

<div id="upgrade-overlay" class="ov hidden">
  <div class="upg-title">⬡ SHIP UPGRADES ⬡</div>
  <div class="upg-sub" id="upg-tokens-label">Select as many as you have picks</div>
  <div class="upg-grid" id="upg-cards"></div>
  <button id="upg-done-btn" class="big-btn" style="margin-top:10px;font-size:.8rem;padding:12px 28px">DONE</button>
</div>

<div id="pause-overlay" class="ov hidden">
  <div class="ov-title" style="font-size:1.6rem;margin-bottom:4px">PAUSED</div>
  <button class="big-btn" id="resume-btn" style="margin:6px 0 10px">RESUME</button>

  <!-- Row 1: Difficulty (most important, shown prominently) -->
  <div class="menu-section-label">DIFFICULTY</div>
  <div class="menu-row" id="diff-row">
    <button class="diff-btn" data-diff="EASY">EASY</button>
    <button class="diff-btn" data-diff="MEDIUM">MEDIUM</button>
    <button class="diff-btn" data-diff="HARD">HARD</button>
  </div>

  <!-- Row 2: Theme (populated by BrandEngine) with inline lock -->
  <div class="menu-section-label">THEME</div>
  <div class="menu-row" id="brand-row"></div>
  <div class="menu-row" style="margin-top:2px">
    <button class="menu-tog compact" id="theme-lock-btn">🔓 AUTO</button>
  </div>

  <!-- Row 3: Quick toggles — all on one line -->
  <div class="menu-row" style="margin-top:6px">
    <button class="menu-tog on compact" id="sfx-btn">SFX</button>
    <button class="menu-tog on compact" id="music-btn">MUSIC</button>
    <button class="menu-tog on compact" id="assist-btn">AIM</button>
  </div>

  <!-- Row 3b: Performance toggle -->
  <div class="menu-section-label" style="margin-top:8px">PERFORMANCE</div>
  <div class="menu-row">
    <button class="menu-tog compact" id="ultra-btn" style="letter-spacing:.08em;min-width:120px">⚡ ULTRA</button>
    <span style="font-family:'Share Tech Mono',monospace;font-size:.52rem;color:rgba(0,229,255,.38);line-height:1.4;text-align:left;max-width:140px;display:inline-block;padding-left:6px">Max FPS · less gfx · DPR×1</span>
  </div>

  <!-- Row 4: Actions -->
  <div class="menu-row" style="margin-top:8px">
    <button class="big-btn" id="restart-btn" style="font-size:.72rem;padding:10px 20px;margin:0 4px">RESTART</button>
    <button class="menu-tog danger compact" id="hs-reset-btn">RESET SCORES</button>
  </div>
</div>

<!-- Difficulty-change toast (hidden by default) -->
<div id="diff-toast" class="hidden"></div>

<div id="boss-banner" class="hidden">⚠ ANOMALY DETECTED ⚠</div>
<div id="upgrade-pill" class="hidden">
  <span id="upgrade-pill-text">⚡ UPGRADE AVAILABLE</span>
</div>

<!-- tutorial-overlay replaced by canvas-drawn tutorial in game.js -->
<div id="tutorial-overlay" class="hidden"></div>

<!--
  LOADING SEQUENCE
  1. brand-schema.js   — validation + defaults
  2. brand-engine.js   — registry + CSS injection
  3. tuning.js         — difficulty presets + game balance
  4. Fetch manifest.json → inject brand scripts
  5. BrandEngine.init() → restore saved brand, build brand row
  6. Tuning.init()     → restore saved difficulty, apply preferred brand
  7. game.js           → start loop
-->
<script src="core/brand-schema.js"></script>
<script src="core/brand-engine.js"></script>
<script src="core/tuning.js"></script>
<script>
(function () {
  'use strict';

  // ── Toast helper ──────────────────────────────────────────────────────
  var _toastTimer = null;
  function showToast(msg) {
    var el = document.getElementById('diff-toast');
    el.textContent = msg;
    el.classList.remove('hidden');
    el.style.opacity = '1';
    if (_toastTimer) clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function () {
      el.style.opacity = '0';
      setTimeout(function () { el.classList.add('hidden'); }, 380);
    }, 3000);
  }

  // ── Difficulty UI ─────────────────────────────────────────────────────
  function refreshDiffButtons() {
    var cur = window.Tuning.getDifficulty();
    document.querySelectorAll('.diff-btn').forEach(function (btn) {
      var d = btn.dataset.diff;
      btn.classList.remove('active-easy','active-medium','active-hard');
      if (d === cur) btn.classList.add('active-' + d.toLowerCase());
    });
  }

  document.querySelectorAll('.diff-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var name = btn.dataset.diff;
      window.Tuning.setDifficulty(name);
      refreshDiffButtons();
      showToast('DIFFICULTY: ' + name + '  ·  RESTART TO APPLY FULLY');
    });
  });

  window.addEventListener('difficultyChanged', refreshDiffButtons);

  // ── Theme lock toggle ─────────────────────────────────────────────────
  function refreshLockBtn() {
    var locked = window.Tuning.isThemeLocked();
    var btn = document.getElementById('theme-lock-btn');
    btn.textContent = locked ? '🔒 LOCKED' : '🔓 AUTO';
    btn.classList.toggle('on', locked);
  }

  document.getElementById('theme-lock-btn').addEventListener('click', function () {
    var newLocked = !window.Tuning.isThemeLocked();
    window.Tuning.setThemeLock(newLocked);
    refreshLockBtn();
    showToast(newLocked ? 'THEME LOCKED — auto-switch disabled' : 'THEME UNLOCKED — follows difficulty');
  });

  // Re-render diff+lock buttons whenever pause overlay opens
  var _pauseObs = new MutationObserver(function (muts) {
    muts.forEach(function (m) {
      if (m.attributeName === 'class') {
        var hidden = document.getElementById('pause-overlay').classList.contains('hidden');
        if (!hidden) { refreshDiffButtons(); refreshLockBtn(); }
      }
    });
  });
  _pauseObs.observe(document.getElementById('pause-overlay'), { attributes: true });

  // ── Script loader ─────────────────────────────────────────────────────
  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      var s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = function () {
        console.warn('[Loader] Failed to load:', src);
        resolve();
      };
      document.head.appendChild(s);
    });
  }

  function hideLoader() {
    var ls = document.getElementById('loading-screen');
    if (ls) {
      ls.style.opacity = '0';
      ls.style.transition = 'opacity .4s';
      setTimeout(function () { ls.remove(); }, 400);
    }
    document.getElementById('overlay').classList.remove('hidden');
  }

  fetch('brands/manifest.json')
    .then(function (r) {
      if (!r.ok) throw new Error('manifest not found');
      return r.json();
    })
    .then(function (manifest) {
      var ids = Array.isArray(manifest.brands) ? manifest.brands : [];
      return ids.reduce(function (chain, id) {
        return chain.then(function () { return loadScript('brands/' + id + '.brand.js'); });
      }, Promise.resolve());
    })
    .catch(function (err) {
      console.warn('[Loader] manifest issue:', err.message);
    })
    .then(function () {
      window.BrandEngine.init();
      window.Tuning.init();        // restore difficulty + apply preferred brand
      refreshDiffButtons();
      refreshLockBtn();
      return loadScript('core/game.js');
    })
    .then(hideLoader)
    .catch(function (err) {
      console.error('[Loader] Fatal error:', err);
      document.getElementById('loading-screen').innerHTML =
        '<div style="color:#ff4444;font-size:.9rem">LOAD ERROR — check console</div>';
    });
})();
</script>
</body>
</html>
