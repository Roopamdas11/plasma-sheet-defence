<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Plasma Sheet Defense</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  .overlay-sub {
    font-family:'Share Tech Mono',monospace;

  #pause-overlay {

  }

  #mute-btn {

  /* UPGRADES */
  #upgrade-overlay {

  .upg-title {
    font-size:clamp(1rem,4vw,1.6rem); font-weight:900; letter-spacing:4px;

  }
  .upg-sub {
    font-family:'Share Tech Mono',monospace; color:#5fbfa0;

    display:flex; gap:14px; flex-wrap:wrap; justify-content:center; padding:0 12px;

</style>

<body>
<canvas id="canvas"></canvas>

<div id="overlay">
  <div class="overlay-title">Plasma Sheet<br>Defense</div>
  <div class="overlay-sub">
    <b>Drag</b> anywhere — ship tracks your thumb<br>
    <b>Left joystick</b> aims &amp; fires (tap / hold)<br>
    <b>Two-finger tap</b> · pulse button = shockwave
  </div>
  <button class="big-btn" id="play-btn">ENGAGE</button>
</div>

<div id="upgrade-overlay" class="hidden">
  <div class="upg-title">⬡ SHIP UPGRADE ⬡</div>
  <div class="upg-sub">CHOOSE ONE</div>

</div>

<div id="pause-overlay" class="hidden">
  <div class="overlay-title" style="font-size:2rem">PAUSED</div>
  <button class="big-btn" id="resume-btn">RESUME</button>
  <button id="mute-btn">🔊 SOUND</button>
</div>

<script>
'use strict';

// ── CANVAS SETUP ────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, CX, CY, DPR;
function resize() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  CX = W/2; CY = H/2;
}
resize();
window.addEventListener('resize', resize);

// ── SEEDED RNG ──────────────────────────────────────────────────────────────
let rngS = 12345;
function rng() {
  rngS ^= rngS<<13; rngS ^= rngS>>17; rngS ^= rngS<<5;
  return (rngS>>>0)/0xFFFFFFFF;
}

// ── AUDIO ───────────────────────────────────────────────────────────────────
let audioCtx = null, muted = false;
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone(freq, dur, type='sine', vol=0.12) {
  if (muted) return;
  try {
    const ac=getAC(), o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.start(); o.stop(ac.currentTime+dur);
  } catch(e){}
}

// ── MUSIC ENGINE ─────────────────────────────────────────────────────────────
let musicTimer = null;
let nextBeatTime = 0;
let beatIdx = 0;

function getMusicBPM() {
  return 118 + (bgPhase||0) * 14;
}

function tablaHit(time, pitch, vol) {
  if (muted) return;
  try {
    const ac = getAC();
    const o = ac.createOscillator();
    const g = ac.createGain();
    const f = ac.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = pitch * 1.5; f.Q.value = 4;
    o.connect(f); f.connect(g); g.connect(ac.destination);
    o.frequency.setValueAtTime(pitch * 2.2, time);
    o.frequency.exponentialRampToValueAtTime(pitch * 0.55, time + 0.14);
    g.gain.setValueAtTime(vol, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
    o.start(time); o.stop(time + 0.22);
  } catch(e) {}
}

function bassPulse(time, freq, vol) {
  if (muted) return;
  try {
    const ac = getAC();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    o.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(0, time);
    g.gain.linearRampToValueAtTime(vol, time + 0.015);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.28);
    o.start(time); o.stop(time + 0.3);
  } catch(e) {}
}

function elecSnare(time, vol) {
  if (muted) return;
  try {
    const ac = getAC();
    const o = ac.createOscillator();
    const g = ac.createGain();
    const f = ac.createBiquadFilter();
    o.type = 'sawtooth'; o.frequency.value = 185;
    f.type = 'highpass'; f.frequency.value = 1800;
    o.connect(f); f.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(vol, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.09);
    o.start(time); o.stop(time + 0.1);
  } catch(e) {}
}

function arpNote(time, freq, vol) {
  if (muted) return;
  try {
    const ac = getAC();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'triangle'; o.frequency.value = freq;
    o.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(vol, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.16);
    o.start(time); o.stop(time + 0.18);
  } catch(e) {}
}

// 16-step tabla pattern: 0=rest, 1=soft, 2=medium, 3=strong
const TAB_PAT = [3,0,0,1, 2,0,1,1, 1,0,2,0, 2,0,1,2];
const ARP_SEQ = [220, 261.6, 329.6, 369.9, 440, 523.2, 369.9, 293.7];

function runMusicScheduler() {
  if (state !== S.PLAY) { musicTimer = setTimeout(runMusicScheduler, 80); return; }
  let ac;
  try { ac = getAC(); } catch(e) { musicTimer = setTimeout(runMusicScheduler, 80); return; }
  if (muted) { musicTimer = setTimeout(runMusicScheduler, 80); return; }

  const bpm = getMusicBPM();
  const stepDur = 60 / bpm / 4; // 16th note
  const AHEAD = 0.22;
  const ph = bgPhase || 0;
  const bassVol = 0.11 + ph * 0.025;

  while (nextBeatTime < ac.currentTime + AHEAD) {
    const step = beatIdx % 16;
    const bar  = Math.floor(beatIdx / 16) % 4;

    // Tabla
    const tv = TAB_PAT[step];
    if (tv > 0) {
      const pitches = [200, 170, 155];
      const vols = [0,0.055,0.082,0.12];
      tablaHit(nextBeatTime, pitches[Math.min(2,ph)], vols[tv]);
    }

    // Bass on steps 0, 6, 8, 12 (varies by bar)
    const bassSteps = [[0,8],[0,6,8,12],[0,4,8,10,12],[0,3,6,8,10,12,14]];
    if ((bassSteps[Math.min(3,ph)] || bassSteps[0]).includes(step)) {
      const freqs = [55, 55, 82.4, 65.4, 41.2];
      bassPulse(nextBeatTime, freqs[step % 5], bassVol);
    }

    // Elec snare on 4, 12
    if (step === 4 || step === 12) {
      elecSnare(nextBeatTime, 0.055 + ph * 0.012);
    }

    // Extra snare in later phases
    if (ph >= 3 && (step === 2 || step === 14)) {
      elecSnare(nextBeatTime, 0.03);
    }

    // Arp pad: starts phase 1, density increases
    if (ph >= 1) {
      const arpDensity = [2, 2, 1, 1][Math.min(3, ph)]; // every N steps
      if (step % arpDensity === 0) {
        const idx = (step / arpDensity + bar * 4) % ARP_SEQ.length;
        const oct = ph >= 2 ? 2 : 1;
        arpNote(nextBeatTime, ARP_SEQ[idx] * oct, 0.028 + ph * 0.006);
      }
    }

    beatIdx++;
    nextBeatTime += stepDur;
  }

  musicTimer = setTimeout(runMusicScheduler, 50);
}

function startMusic() {
  if (musicTimer) clearTimeout(musicTimer);
  beatIdx = 0;
  try {
    const ac = getAC();
    nextBeatTime = ac.currentTime + 0.12;
  } catch(e) { nextBeatTime = 0; }
  musicTimer = setTimeout(runMusicScheduler, 0);
}

function stopMusic() {
  if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
}

// ── MATH ────────────────────────────────────────────────────────────────────
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
const lerp  = (a,b,t) => a+(b-a)*t;
function dist(ax,ay,bx,by) { return Math.hypot(ax-bx,ay-by); }

// ── GAME STATE ──────────────────────────────────────────────────────────────
const S = {START:0,PLAY:1,UPGRADE:2,PAUSE:3,OVER:4};
let state = S.START;
let score = 0, elapsed = 0, waveStage = 0;
let shake = {x:0,y:0,t:0};
let bgPhase = 0;

// ── TOWER ───────────────────────────────────────────────────────────────────
let tower = {hp:100,maxHp:100,radius:28,regenTimer:0,hitFlash:0};

// ── PLAYER ──────────────────────────────────────────────────────────────────
let shard = {
  x:0, y:0,
  aimAngle: -Math.PI/2,
  aimLocked: false,
  autoAimGrace: 0,
  fireCooldown:0, fireRate:0.55,
  radius:26,
  isDragged: false,
  trailX: [], trailY: [],
  hasPlasmaTrail: false,
  trailDmgMult: 1,
  overdriveMode: false,
  overdriveTimer: 0,
  shieldHp: 0, shieldRegenTime: 12, shieldRegenTimer: 0,
};

// ── UPGRADES ────────────────────────────────────────────────────────────────
let upg = {
  fireRate:1, dartSpeed:1, knockback:1, pulseCdMult:1,
  shotCount: 1,
  slowAura:false, pierce:false,
  ghostActive:false, ghostLife:0, ghostX:0, ghostY:0,
  ramDmg: 0.6,
  knockbackMult: 1,
};

// UPGRADES — pool (repeatable & progressive)
const UPGRADE_POOL = [
  { icon:'🔥', name:'Fire Rate +15%',   desc:'Stacks multiplicatively',
    apply:()=>{ upg.fireRate*=0.85; } },
  { icon:'⚡', name:'Dart Speed +15%',  desc:'Faster projectiles',
    apply:()=>{ upg.dartSpeed*=1.15; } },
  { icon:'💥', name:'Ram Damage +0.4',  desc:'Body collision damage up',
    apply:()=>{ upg.ramDmg+=0.4; } },
  { icon:'🌀', name:'Knockback +20%',   desc:'Heavier impacts',
    apply:()=>{ upg.knockbackMult*=1.2; } },
  { icon:'◈',  name:'+1 Shot',          desc:`${upg?'Current: '+upg.shotCount:''}  max 4`,
    canShow:()=>upg.shotCount<4,
    apply:()=>{ upg.shotCount=Math.min(4,upg.shotCount+1); } },
  { icon:'◆',  name:'Pierce Rounds',    desc:'Darts pass through foes',
    canShow:()=>!upg.pierce,
    apply:()=>{ upg.pierce=true; } },
  { icon:'🌊', name:'Plasma Trail',     desc:'Trail damages enemies',
    canShow:()=>!shard.hasPlasmaTrail,
    apply:()=>{ shard.hasPlasmaTrail=true; } },
  { icon:'〰', name:'Trail Dmg +25%',   desc:'Stronger plasma wake',
    canShow:()=>shard.hasPlasmaTrail,
    apply:()=>{ shard.trailDmgMult=(shard.trailDmgMult||1)*1.25; } },
  { icon:'🛡', name:'Shield Regen',     desc:'Absorbs 1 hit, recharges',
    apply:()=>{ shard.shieldHp=1; shard.shieldRegenTime=Math.max(3,(shard.shieldRegenTime||12)-2); } },
  { icon:'◎',  name:'Pulse CD -15%',    desc:'Shockwave charges faster',
    apply:()=>{ upg.pulseCdMult*=0.85; } },
  { icon:'👻', name:'Ghost Ship',       desc:'Twin fires alongside you',
    canShow:()=>!upg.ghostActive,
    apply:()=>{ spawnGhost(); } },
  { icon:'❄',  name:'Slow Aura',        desc:'Chills nearby enemies',
    canShow:()=>!upg.slowAura,
    apply:()=>{ upg.slowAura=true; } },
  { icon:'☄',  name:'Overdrive',        desc:'8s of rapid burst fire',
    apply:()=>{ shard.overdriveMode=true; shard.overdriveTimer=8; tone(120,1.2,'sawtooth',0.2); } },
];

const MILESTONES = [100,300,600,1000,1600,2500,3800,5500,7500,10000];
let milestonesHit = new Set();
let upgradeFlash = {text:'', timer:0};

// ── PULSE ───────────────────────────────────────────────────────────────────
let pulse = {cd:0, maxCd:5, rings:[]};

// ── OBJECTS ─────────────────────────────────────────────────────────────────
let projectiles=[], enemies=[], particles=[];
let enemyId=0;

// ── ENEMY BASE DEFS ─────────────────────────────────────────────────────────
const EDEFS = {
  runner:  {color:'#ff4488',radius:8,   hp:2,  speed:65, reward:5,  shape:'tri',     extraDmg:0, mass:1},
  tank:    {color:'#ff8c00',radius:14,  hp:10, speed:28, reward:15, shape:'hex',     extraDmg:0, mass:5},
  splitter:{color:'#cc44ff',radius:10,  hp:5,  speed:48, reward:10, shape:'circ',    extraDmg:0, mass:1.5},
  leech:   {color:'#ff6633',radius:9,   hp:3,  speed:55, reward:8,  shape:'diamond', extraDmg:2, mass:2},
  brute:   {color:'#ff3300',radius:18,  hp:18, speed:20, reward:22, shape:'ngon',    extraDmg:1, mass:8},
  dodger:  {color:'#00ffaa',radius:10,  hp:4,  speed:52, reward:12, shape:'tri',     extraDmg:0, mass:1.2},
  skitter: {color:'#ffee00',radius:6,   hp:2,  speed:90, reward:6,  shape:'tri',     extraDmg:0, mass:0.6},
};

// ── ON-SCREEN CONTROLS ──────────────────────────────────────────────────────
const controls = {
  aim:  {x:0,y:0,r:64, active:false, pid:null, dx:0, dy:0},
  move: {active:false, pid:null, rawX:0, rawY:0}
};

function layoutControls(){
  const pad = 26;
  controls.aim.x = pad + controls.aim.r;
  controls.aim.y = H - pad - controls.aim.r;
}
layoutControls();
window.addEventListener('resize', layoutControls);

function inCircle(px,py,cx,cy,r){
  const dx=px-cx, dy=py-cy;
  return dx*dx+dy*dy <= r*r;
}

// ── INPUT ───────────────────────────────────────────────────────────────────
const ptrs = {};
canvas.addEventListener('pointerdown', onPD, {passive:false});
canvas.addEventListener('pointermove', onPM, {passive:false});
canvas.addEventListener('pointerup',   onPU, {passive:false});
canvas.addEventListener('pointercancel',onPU, {passive:false});
canvas.addEventListener('contextmenu', e=>{e.preventDefault(); triggerPulse();});

function onPD(e) {
  e.preventDefault();
  try { getAC(); } catch(err){}
  ptrs[e.pointerId] = {x:e.clientX, y:e.clientY};
  if (state !== S.PLAY) return;
  const x=e.clientX, y=e.clientY;

  if (!controls.aim.active && inCircle(x,y,controls.aim.x,controls.aim.y,controls.aim.r*1.15)) {
    controls.aim.active = true;
    controls.aim.pid = e.pointerId;
    controls.aim.dx = 0; controls.aim.dy = 0;
    shard.aimLocked = true;
    shard.autoAimGrace = 0;
    manualFireImmediate();
    shard.fireCooldown = 0;
    return;
  }

  if (Object.keys(ptrs).length >= 2) { triggerPulse(); return; }

  if (!controls.move.active) {
    controls.move.active = true;
    controls.move.pid = e.pointerId;
    controls.move.rawX = x; controls.move.rawY = y;
    shard.isDragged = true;
    shard.x = clamp(x, shard.radius, W - shard.radius);
    shard.y = clamp(y, shard.radius, H - shard.radius);
  }
}

function onPM(e) {
  e.preventDefault();
  const p = ptrs[e.pointerId]; if (!p) return;
  p.x = e.clientX; p.y = e.clientY;
  if (state !== S.PLAY) return;
  const x=e.clientX, y=e.clientY;

  if (controls.aim.active && e.pointerId === controls.aim.pid) {
    let dx = x - controls.aim.x, dy = y - controls.aim.y;
    const len = Math.hypot(dx,dy) || 1;
    const max = controls.aim.r*0.9, k = Math.min(1, max/len);
    dx *= k; dy *= k;
    controls.aim.dx = dx; controls.aim.dy = dy;
    if (Math.hypot(dx,dy) > 8) shard.aimAngle = Math.atan2(dy,dx);
    return;
  }

  if (controls.move.active && e.pointerId === controls.move.pid) {
    controls.move.rawX = x; controls.move.rawY = y;
    shard.x = clamp(x, shard.radius+2, W - shard.radius-2);
    shard.y = clamp(y, shard.radius+2, H - shard.radius-2);
  }
}

function onPU(e) {
  e.preventDefault();
  delete ptrs[e.pointerId];
  if (controls.aim.active && e.pointerId === controls.aim.pid) {
    controls.aim.active = false;
    controls.aim.pid = null;
    controls.aim.dx = 0; controls.aim.dy = 0;
    // AUTO-AIM: unlock + grace period
    shard.aimLocked = false;
    shard.autoAimGrace = 0.25;
  }
  if (controls.move.active && e.pointerId === controls.move.pid) {
    controls.move.active = false;
    controls.move.pid = null;
    shard.isDragged = false;
  }
}

const keys = {};
window.addEventListener('keydown', e=>{
  keys[e.code]=true;
  if(e.code==='Space'){e.preventDefault();triggerPulse();}
  if(e.code==='KeyP') togglePause();
  if(e.code==='KeyQ'){shard.aimAngle-=0.15;shard.aimLocked=true;shard.autoAimGrace=0;}
  if(e.code==='KeyE'){shard.aimAngle+=0.15;shard.aimLocked=true;shard.autoAimGrace=0;}
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

// ── BUTTONS ─────────────────────────────────────────────────────────────────
const pulseBtn = document.createElement('button');
pulseBtn.style.cssText='position:fixed;top:18px;left:18px;width:56px;height:56px;border-radius:50%;background:transparent;border:2px solid #00e5ff;cursor:pointer;pointer-events:all;z-index:5;font-size:22px;color:#00e5ff;box-shadow:0 0 12px rgba(0,229,255,0.5);';
pulseBtn.textContent='◎';
pulseBtn.addEventListener('pointerdown',e=>{e.stopPropagation();triggerPulse();});
document.body.appendChild(pulseBtn);

const pauseBtn = document.createElement('button');
pauseBtn.style.cssText='position:fixed;top:18px;right:18px;width:52px;height:52px;border-radius:4px;background:transparent;border:2px solid rgba(0,229,255,0.5);cursor:pointer;pointer-events:all;z-index:5;font-size:20px;color:#00e5ff;';
pauseBtn.textContent='⏸';
pauseBtn.addEventListener('pointerdown',e=>{e.stopPropagation();togglePause();});
document.body.appendChild(pauseBtn);

// ── MANUAL FIRE ─────────────────────────────────────────────────────────────
function manualFireImmediate(){
  if(state!==S.PLAY) return;
  doFireShot(shard.x, shard.y, shard.aimAngle);
  tone(720,0.04,'square',0.07);
}

function doFireShot(x, y, angle) {
  const count = upg.shotCount;
  if (count === 1) {
    fireDart(x, y, angle);
  } else {
    const spread = 0.20;
    for (let i = 0; i < count; i++) {
      const a = angle + (i - (count-1)/2) * spread;
      fireDart(x, y, a);
    }
  }
  if (shard.overdriveMode) {
    fireDart(x, y, angle + 0.55);
    fireDart(x, y, angle - 0.55);
  }
}

// ── PULSE ───────────────────────────────────────────────────────────────────
function triggerPulse() {
  if(state!==S.PLAY||pulse.cd>0) return;
  pulse.cd = pulse.maxCd * upg.pulseCdMult;
  pulse.rings.push({r:tower.radius, maxR:Math.max(W,H)*0.6});
  enemies.forEach(en=>{
    const dx=en.x-CX,dy=en.y-CY,d=Math.hypot(dx,dy)||1;
    const f=140*(1-d/(Math.max(W,H)*0.6));
    if(f>0){en.vx+=dx/d*f;en.vy+=dy/d*f;}
  });
  tone(200,0.25,'sine',0.18);
}

function togglePause() {
  if(state===S.PLAY){
    state=S.PAUSE;
    document.getElementById('pause-overlay').classList.remove('hidden');
    pauseBtn.textContent='▶';
  } else if(state===S.PAUSE) resumeGame();
}
function resumeGame(){
  state=S.PLAY;
  document.getElementById('pause-overlay').classList.add('hidden');
  pauseBtn.textContent='⏸';
  try { const ac=getAC(); nextBeatTime=ac.currentTime+0.1; } catch(e){}
}

// UPGRADES — show overlay
function showUpgradeOverlay() {
  state = S.UPGRADE;
  document.getElementById('upgrade-overlay').classList.remove('hidden');

  // Build eligible pool
  const eligible = UPGRADE_POOL.filter(u => !u.canShow || u.canShow());
  // Pick 3 distinct random ones
  const pool = [...eligible];
  const chosen = [];
  while (chosen.length < 3 && pool.length > 0) {
    const idx = Math.floor(rng() * pool.length);
    chosen.push(pool.splice(idx, 1)[0]);
  }

  const container = document.getElementById('upg-cards');
  container.innerHTML = '';
  chosen.forEach(u => {
    const card = document.createElement('div');
    card.className = 'upg-card';
    const desc = typeof u.desc === 'function' ? u.desc() : u.desc;
    card.innerHTML = `<div class="card-icon">${u.icon}</div><div class="card-name">${u.name}</div><div class="card-desc">${desc}</div>`;
    card.addEventListener('click', () => {
      u.apply();
      upgradeFlash.text = u.name;
      upgradeFlash.timer = 2.5;
      document.getElementById('upgrade-overlay').classList.add('hidden');
      state = S.PLAY;
      try { const ac=getAC(); nextBeatTime=ac.currentTime+0.05; } catch(e){}
      tone(660,0.3,'sine',0.12); tone(880,0.2,'sine',0.09);
    });
    container.appendChild(card);
  });
}

// ── DIRECTOR / SPAWN SYSTEM ─────────────────────────────────────────────────
let spawnTimer = 2.0;

function getThreat() {
  return Math.pow(elapsed * 0.015 + score * 0.00045, 1.25);
}

function spawnInterval() {
  const t = getThreat();
  const base = Math.max(0.35, 2.2 - t * 0.18);
  const lowHpMult = tower.hp < tower.maxHp * 0.3 ? 1.5 : 1.0;
  return base * lowHpMult;
}

function getEnemyCap() {
  return Math.min(35, 14 + Math.floor(getThreat() * 1.8));
}

function pickEnemyType() {
  const t = getThreat();
  // Weighted pool evolves with threat
  const w = {
    runner:  Math.max(0, 3.5 - t * 0.15),
    splitter:Math.max(0, 1.5 + Math.min(t * 0.3, 2.5) - Math.max(0, t - 8) * 0.3),
    leech:   t > 2 ? Math.min(t * 0.25, 2.2) : 0,
    tank:    t > 1 ? Math.min(t * 0.2, 2.5)  : 0,
    brute:   t > 4 ? Math.min((t - 4) * 0.3, 2.0) : 0,
    dodger:  t > 5 ? Math.min((t - 5) * 0.25, 1.8) : 0,
    skitter: t > 3 ? Math.min((t - 3) * 0.35, 2.8) : 0,
  };
  let total = 0;
  for (const k in w) total += w[k];
  if (total <= 0) return 'runner';
  let r = rng() * total;
  for (const k in w) { r -= w[k]; if (r <= 0) return k; }
  return 'runner';
}

function spawnEnemy() {
  if (enemies.length >= getEnemyCap()) return;
  const a = rng() * Math.PI * 2;
  const sr = Math.max(W, H) * 0.72;
  const ex = CX + Math.cos(a)*sr, ey = CY + Math.sin(a)*sr;

  const type = tower.hp < tower.maxHp * 0.3 ? 'runner' : pickEnemyType();
  const d = EDEFS[type];
  const t = getThreat();

  // Scale stats with threat
  const hpScale = 1 + t * 0.07;
  const spdScale = 1 + t * 0.025;

  let sides = 6; // for brute ngon
  if (type === 'brute') {
    sides = Math.min(14, 6 + Math.floor(t * 0.6));
  }

  enemies.push({
    id:enemyId++, type,
    x:ex, y:ey, vx:0, vy:0,
    hp:d.hp*hpScale, maxHp:d.hp*hpScale,
    hitTimer:0, stunTimer:0,
    wobble:rng()*Math.PI*2,
    color:d.color,
    radius:d.radius + (type==='brute'?Math.floor(t*0.5):0),
    speed:d.speed * spdScale,
    reward:d.reward,
    shape:d.shape,
    sides,
    extraDmg:d.extraDmg,
    mass:d.mass,
    _rm:false,
    // dodger-specific
    dodgeCd: 0,
    // skitter-specific
    zigTimer: rng() * 1.5,
    zigDir: rng() > 0.5 ? 1 : -1,
  });
}

// ── PHYSICS ─────────────────────────────────────────────────────────────────
const FIXED_DT = 1/120;
let accumulator = 0;

function update(dt) {
  if(state!==S.PLAY) return;
  elapsed+=dt; waveStage=Math.floor(elapsed/30);
  if(shake.t>0){shake.t-=dt;if(shake.t<=0){shake.x=0;shake.y=0;}}

  // PLAYER — keyboard movement
  const km=220*dt;
  if(keys['KeyW']||keys['ArrowUp'])    shard.y=clamp(shard.y-km,shard.radius,H-shard.radius);
  if(keys['KeyS']||keys['ArrowDown'])  shard.y=clamp(shard.y+km,shard.radius,H-shard.radius);
  if(keys['KeyA']||keys['ArrowLeft'])  shard.x=clamp(shard.x-km,shard.radius,W-shard.radius);
  if(keys['KeyD']||keys['ArrowRight']) shard.x=clamp(shard.x+km,shard.radius,W-shard.radius);

  // Overdrive timer
  if(shard.overdriveMode){ shard.overdriveTimer-=dt; if(shard.overdriveTimer<=0) shard.overdriveMode=false; }

  // Shield regen
  if(shard.shieldHp===0&&shard.shieldRegenTime>0){
    shard.shieldRegenTimer+=dt;
    if(shard.shieldRegenTimer>=shard.shieldRegenTime){ shard.shieldHp=1; shard.shieldRegenTimer=0; tone(440,0.3,'sine',0.1); }
  }

  // Trail
  shard.trailX.unshift(shard.x); shard.trailY.unshift(shard.y);
  if(shard.trailX.length>18){shard.trailX.pop();shard.trailY.pop();}

  // Plasma trail damage
  if(shard.hasPlasmaTrail){
    enemies.forEach(en=>{
      if(en._rm||en.hitTimer>0) return;
      for(let i=0;i<Math.min(8,shard.trailX.length);i++){
        if(dist(en.x,en.y,shard.trailX[i],shard.trailY[i])<shard.radius*0.9){
          hitEnemy(en, 0.3 * shard.trailDmgMult); break;
        }
      }
    });
  }

  // MILESTONE CHECK → trigger upgrade overlay
  MILESTONES.forEach((ms, i) => {
    if (!milestonesHit.has(i) && score >= ms) {
      milestonesHit.add(i);
      bgPhase = milestonesHit.size;
      showUpgradeOverlay();
    }
  });
  if(upgradeFlash.timer>0) upgradeFlash.timer-=dt;

  // Pulse
  if(pulse.cd>0) pulse.cd=Math.max(0,pulse.cd-dt);
  pulse.rings.forEach(r=>{r.r+=195*dt;});
  pulse.rings=pulse.rings.filter(r=>r.r<r.maxR);

  // AUTO-AIM grace counter
  if(shard.autoAimGrace>0) shard.autoAimGrace-=dt;

  // Firing
  shard.fireCooldown-=dt;
  const holdingFire = controls.aim.active;
  if(shard.fireCooldown<=0){
    if(holdingFire){
      doFireShot(shard.x,shard.y,shard.aimAngle);
      shard.fireCooldown=Math.max(0.05,shard.fireRate*upg.fireRate*0.30);
      tone(700,0.035,'square',0.055);
    } else {
      const hasTarget = shard.aimLocked || enemyInCone(shard.x,shard.y,shard.aimAngle,Math.PI*65/180,370);
      if(hasTarget){
        doFireShot(shard.x,shard.y,shard.aimAngle);
        shard.fireCooldown=shard.fireRate*upg.fireRate;
        tone(680,0.04,'square',0.055);
      } else { shard.fireCooldown=0.08; }
    }
  }

  // Ghost
  if(upg.ghostActive){
    upg.ghostLife-=dt;
    if(upg.ghostLife<=0) upg.ghostActive=false;
    else {
      upg.ghostX=lerp(upg.ghostX,CX+Math.cos(elapsed*0.9)*Math.min(W,H)*0.25,0.05);
      upg.ghostY=lerp(upg.ghostY,CY+Math.sin(elapsed*1.2)*Math.min(W,H)*0.16,0.05);
      const gt=nearestEnemy(upg.ghostX,upg.ghostY);
      if(gt){ const ga=Math.atan2(gt.y-upg.ghostY,gt.x-upg.ghostX); if(shard.fireCooldown<0.02) fireDart(upg.ghostX,upg.ghostY,ga); }
    }
  }

  const slowR = upg.slowAura ? 82 : 0;
  const t = getThreat();

  // ENEMY update
  enemies.forEach(en=>{
    if(en._rm) return;
    if(en.hitTimer>0) en.hitTimer-=dt;
    if(en.stunTimer>0){en.stunTimer-=dt;en.vx*=0.82;en.vy*=0.82;return;}

    let sm=1;
    if(upg.slowAura&&dist(en.x,en.y,shard.x,shard.y)<slowR+en.radius) sm=0.33;

    const dx=CX-en.x, dy=CY-en.y, d=Math.hypot(dx,dy)||1;
    const ms=en.speed*sm;

    if(en.type==='dodger'){
      // Dodge incoming projectiles
      if(en.dodgeCd>0) en.dodgeCd-=dt;
      else {
        for(let p of projectiles){
          if(p.dead) continue;
          const pdx=en.x-p.x, pdy=en.y-p.y;
          const pd=Math.hypot(pdx,pdy);
          if(pd>150) continue;
          // Check if projectile is heading toward us
          const pvLen=Math.hypot(p.vx,p.vy)||1;
          const dot=(p.vx*(en.x-p.x)+p.vy*(en.y-p.y))/(pvLen*pd);
          if(dot>0.7){ // approaching
            // Perpendicular dodge
            const dodgeStr = 60 + t*8;
            const perpX = -p.vy/pvLen, perpY = p.vx/pvLen;
            const sign = (Math.random()>0.5)?1:-1;
            en.vx += perpX * sign * dodgeStr;
            en.vy += perpY * sign * dodgeStr;
            en.dodgeCd = 0.35;
            break;
          }
        }
      }
    }

    if(en.type==='skitter'){
      // Zig-zag
      en.zigTimer-=dt;
      if(en.zigTimer<=0){ en.zigDir*=-1; en.zigTimer=0.3+rng()*0.5; }
      const perp = { x: -dy/d, y: dx/d };
      const zigStr = 35 + t*5;
      en.vx += perp.x * en.zigDir * zigStr * dt;
      en.vy += perp.y * en.zigDir * zigStr * dt;
    }

    en.vx+=(dx/d*ms-en.vx)*0.08;
    en.vy+=(dy/d*ms-en.vy)*0.08;
    en.vx*=0.92; en.vy*=0.92;
    en.x+=en.vx*dt; en.y+=en.vy*dt;
    en.wobble+=dt*3;

    // Tower hit
    if(dist(en.x,en.y,CX,CY)<tower.radius+en.radius){
      tower.hp-=5+en.extraDmg; tower.hitFlash=0.3;
      tone(80,0.18,'sawtooth',0.2);
      shake.x=(rng()-0.5)*6;shake.y=(rng()-0.5)*6;shake.t=0.1;
      if(en.type==='splitter') doSplit(en);
      en._rm=true;
      if(tower.hp<=0){ gameOver(); return; }
      return;
    }
    shardBump(en,shard.x,shard.y);
    if(upg.ghostActive) shardBump(en,upg.ghostX,upg.ghostY);
  });
  enemies=enemies.filter(e=>!e._rm);

  // Tower regen
  if(tower.hitFlash>0) tower.hitFlash-=dt;
  tower.regenTimer+=dt;
  if(tower.regenTimer>=3&&tower.hp<tower.maxHp){ tower.hp=Math.min(tower.maxHp,tower.hp+0.06); tower.regenTimer=0; }

  // Projectiles
  projectiles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;});
  projectiles=projectiles.filter(p=>p.life>0&&!p.dead);

  // Proj vs enemy
  projectiles.forEach(p=>{
    if(p.dead) return;
    enemies.forEach(en=>{
      if(p.dead||en._rm) return;
      if(dist(p.x,p.y,en.x,en.y)<en.radius+5){
        hitEnemy(en,1);
        if(!upg.pierce||p.pierced) p.dead=true; else p.pierced=true;
      }
    });
  });
  projectiles=projectiles.filter(p=>!p.dead);

  // AUTO-AIM: resume when grace expires and not locked
  if(!shard.aimLocked && shard.autoAimGrace<=0){
    const ne=nearestEnemy(shard.x,shard.y);
    if(ne) shard.aimAngle=Math.atan2(ne.y-shard.y,ne.x-shard.x);
  }

  // Spawn
  spawnTimer-=dt;
  if(spawnTimer<=0){ spawnEnemy(); spawnTimer=spawnInterval(); }

  // Particles
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=30*dt;p.vx*=0.97;p.life-=dt;});
  particles=particles.filter(p=>p.life>0);
  if(particles.length>220) particles.splice(0,particles.length-220);
}

function nearestEnemy(x,y){
  let best=null,bd=Infinity;
  enemies.forEach(e=>{if(e._rm)return;const d=dist(x,y,e.x,e.y);if(d<bd){bd=d;best=e;}});
  return best;
}
function enemyInCone(x,y,angle,half,maxD){
  return enemies.some(en=>{
    if(en._rm)return false;
    const dx=en.x-x,dy=en.y-y,d=Math.hypot(dx,dy);
    if(d>maxD)return false;
    const a=Math.atan2(dy,dx); let da=Math.abs(a-angle);
    if(da>Math.PI) da=Math.PI*2-da;
    return da<half;
  });
}
function fireDart(x,y,angle){
  const spr=(rng()-0.5)*0.11, spd=345*upg.dartSpeed;
  const a=angle+spr;
  projectiles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1.4,dead:false,pierced:false});
}

function shardBump(en,sx,sy){
  if(en.hitTimer>0)return;
  const d=dist(en.x,en.y,sx,sy), r=shard.radius+en.radius;
  if(d<r){
    const nx=(en.x-sx)/d, ny=(en.y-sy)/d;
    const impulse=(380*upg.knockbackMult)/(en.mass||1);
    en.vx+=nx*impulse; en.vy+=ny*impulse;
    en.stunTimer=0.18; en.hitTimer=0.2;
    en.x+=nx*(r-d); en.y+=ny*(r-d);
    hitEnemy(en,upg.ramDmg);
    spawnImpact(en.x,en.y,en.color);
    tone(300,0.06,'triangle',0.12);
  }
}
function hitEnemy(en,dmg){
  if(en._rm)return;
  en.hp-=dmg;
  if(en.hp<=0){
    score+=en.reward;
    if(en.type==='splitter') doSplit(en);
    spawnPlasmaExplosion(en.x,en.y,en.color);
    en._rm=true;
  }
}
function doSplit(en){
  for(let i=0;i<2;i++){
    const a=rng()*Math.PI*2, d=EDEFS.runner;
    enemies.push({id:enemyId++,type:'runner',x:en.x+Math.cos(a)*12,y:en.y+Math.sin(a)*12,
      vx:0,vy:0,hp:1,maxHp:1,hitTimer:0,stunTimer:0,wobble:rng()*Math.PI*2,
      color:d.color,radius:d.radius,speed:d.speed,reward:3,shape:'tri',sides:3,
      extraDmg:0,mass:d.mass,dodgeCd:0,zigTimer:0.5,zigDir:1,_rm:false});
  }
}

// FX
function spawnImpact(x,y,color){
  for(let i=0;i<4;i++){
    const a=rng()*Math.PI*2,s=28+rng()*42;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.28+rng()*0.15,color,size:2+rng()*3,type:'dot'});
  }
}
function spawnPlasmaExplosion(x,y,color){
  particles.push({x,y,vx:0,vy:0,life:0.35,color:'#ffffff',size:28,type:'flash'});
  for(let i=0;i<16;i++){
    const a=rng()*Math.PI*2,s=70+rng()*110;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.5+rng()*0.4,color,size:3+rng()*5,type:'glow'});
  }
  for(let i=0;i<8;i++){
    const a=rng()*Math.PI*2,s=40+rng()*60;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-30,life:0.5+rng()*0.3,color,size:5+rng()*6,type:'rect',rot:rng()*Math.PI*2});
  }
  tone(500,0.06,'triangle',0.09);
}

// ── RENDER ──────────────────────────────────────────────────────────────────
let plasmaT = 0;

// Background phase color tables
const BG_PHASES = [
  // inner, mid, outer, gridColor, overlayTint
  ['#0d0625','#08031a','#020010','#3333aa','rgba(40,0,100,0)'],
  ['#022535','#011428','#000d20','#00446e','rgba(0,60,120,0.05)'],
  ['#1a0530','#0e021e','#060012','#660088','rgba(120,0,160,0.06)'],
  ['#2a0810','#1a0508','#0e0203','#882200','rgba(160,40,0,0.07)'],
  ['#2e0f00','#1e0800','#0e0200','#aa4400','rgba(200,80,0,0.09)'],
];

function getBgColors() {
  const ph = Math.min(bgPhase, BG_PHASES.length-1);
  return BG_PHASES[ph];
}

function render(){
  plasmaT+=0.015;
  ctx.save();
  ctx.translate(shake.x,shake.y);

  // RENDER — background with phase colors
  const bg = ctx.createRadialGradient(CX,CY,0,CX,CY,Math.max(W,H)*0.85);
  const [c0,c1,c2,gridC,overlayC] = getBgColors();
  bg.addColorStop(0, c0);
  bg.addColorStop(0.5, c1);
  bg.addColorStop(1, c2);
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Phase overlay pulse tint
  if(bgPhase>0){
    const pulseFactor=0.5+Math.sin(plasmaT*2)*0.5;
    const [,,,, ov] = getBgColors();
    ctx.save();
    ctx.globalAlpha=pulseFactor*0.4;
    ctx.fillStyle=ov; ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // Plasma shimmer grid
  ctx.save();
  ctx.globalAlpha=0.06;
  ctx.strokeStyle=gridC;
  ctx.lineWidth=0.5;
  const gridSz=60;
  for(let gx=0;gx<W;gx+=gridSz){
    ctx.beginPath();
    ctx.moveTo(gx+Math.sin(plasmaT+gx*0.01)*3,0);
    ctx.lineTo(gx+Math.sin(plasmaT+gx*0.01)*3,H);
    ctx.stroke();
  }
  for(let gy=0;gy<H;gy+=gridSz){
    ctx.beginPath();
    ctx.moveTo(0,gy+Math.sin(plasmaT*0.8+gy*0.01)*3);
    ctx.lineTo(W,gy+Math.sin(plasmaT*0.8+gy*0.01)*3);
    ctx.stroke();
  }
  ctx.restore();

  // Range rings
  ctx.save();
  ctx.strokeStyle='rgba(0,180,255,0.07)'; ctx.lineWidth=1; ctx.setLineDash([4,8]);
  [0.28,0.48,0.68].forEach(f=>{
    ctx.beginPath(); ctx.arc(CX,CY,Math.min(W,H)*f,0,Math.PI*2); ctx.stroke();
  });
  ctx.setLineDash([]); ctx.restore();

  // Pulse rings
  pulse.rings.forEach(r=>{
    const a=1-r.r/r.maxR;
    ctx.save();
    ctx.strokeStyle=`rgba(0,229,255,${a*0.6})`; ctx.lineWidth=3*a+0.5;
    ctx.shadowColor='#00e5ff'; ctx.shadowBlur=12*a;
    ctx.beginPath(); ctx.arc(CX,CY,r.r,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  });

  drawTower();
  enemies.forEach(en=>{if(!en._rm) drawEnemy(en);});

  // Plasma trail
  if(shard.hasPlasmaTrail&&shard.trailX.length>1){
    ctx.save();
    for(let i=1;i<shard.trailX.length;i++){
      const a=(1-i/shard.trailX.length)*0.5;
      ctx.globalAlpha=a;
      ctx.strokeStyle='#00ffcc';
      ctx.lineWidth=shard.radius*0.6*(1-i/shard.trailX.length);
      ctx.shadowColor='#00ffcc'; ctx.shadowBlur=8;
      ctx.beginPath();
      ctx.moveTo(shard.trailX[i-1],shard.trailY[i-1]);
      ctx.lineTo(shard.trailX[i],shard.trailY[i]);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Slow aura
  if(upg.slowAura){
    ctx.save(); ctx.globalAlpha=0.13;
    const g=ctx.createRadialGradient(shard.x,shard.y,0,shard.x,shard.y,82+shard.radius);
    g.addColorStop(0,'#00aaff'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(shard.x,shard.y,82+shard.radius,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Ghost
  if(upg.ghostActive&&upg.ghostLife>0){
    const a=clamp(upg.ghostLife/8,0,1)*0.42;
    drawShipAt(upg.ghostX,upg.ghostY,shard.aimAngle,a);
  }

  drawAimLine();
  drawShipAt(shard.x,shard.y,shard.aimAngle,1);

  // Thumb ring
  if(shard.isDragged&&controls.move.active){
    const rx=controls.move.rawX, ry=controls.move.rawY;
    ctx.save();
    ctx.shadowBlur=20; ctx.shadowColor='rgba(0,229,255,0.9)';
    ctx.strokeStyle='rgba(0,229,255,0.7)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(rx,ry,26,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=8;
    ctx.strokeStyle='rgba(0,229,255,0.25)'; ctx.lineWidth=8;
    ctx.beginPath(); ctx.arc(rx,ry,26,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // Projectiles
  projectiles.forEach(p=>{
    ctx.save();
    const angle=Math.atan2(p.vy,p.vx);
    ctx.translate(p.x,p.y); ctx.rotate(angle);
    ctx.globalAlpha=0.35;
    ctx.strokeStyle='#00ffff'; ctx.lineWidth=1.5;
    ctx.shadowColor='#00ffff'; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.moveTo(-22,0); ctx.lineTo(0,0); ctx.stroke();
    ctx.globalAlpha=1;
    ctx.shadowBlur=10; ctx.shadowColor='#00e5ff';
    ctx.fillStyle='#00e5ff';
    ctx.beginPath(); ctx.moveTo(12,0); ctx.lineTo(-4,3); ctx.lineTo(-4,-3); ctx.closePath(); ctx.fill();
    ctx.restore();
  });

  // Particles
  particles.forEach(p=>{
    ctx.save();
    const a=clamp(p.life*2.5,0,1); ctx.globalAlpha=a;
    if(p.type==='flash'){
      ctx.shadowBlur=30; ctx.shadowColor=p.color; ctx.fillStyle=p.color; ctx.globalAlpha=a*0.6;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*(1-a+0.1),0,Math.PI*2); ctx.fill();
    } else if(p.type==='glow'){
      ctx.shadowBlur=15; ctx.shadowColor=p.color; ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2); ctx.fill();
    } else if(p.type==='rect'){
      ctx.translate(p.x,p.y); ctx.rotate(p.rot+p.life*4);
      ctx.shadowBlur=8; ctx.shadowColor=p.color; ctx.fillStyle=p.color;
      ctx.fillRect(-p.size/2,-p.size/3,p.size,p.size*0.5);
    } else {
      ctx.shadowBlur=6; ctx.shadowColor=p.color; ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });

  drawControls();
  drawHUD();
  ctx.restore();
}

// RENDER — controls
function drawControls(){
  if(state!==S.PLAY&&state!==S.PAUSE) return;
  drawPad(controls.aim.x, controls.aim.y, controls.aim.r, 'AIM / FIRE');
  const kx=controls.aim.x+controls.aim.dx, ky=controls.aim.y+controls.aim.dy;
  drawKnob(kx,ky,controls.aim.r*0.36);
}
function drawPad(x,y,r,label){
  ctx.save();
  ctx.globalAlpha=0.14; ctx.fillStyle='#00aaff';
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=0.32; ctx.strokeStyle='rgba(0,180,255,0.6)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=0.45; ctx.fillStyle='#00aaff';
  ctx.font=`${clamp(W*0.022,9,13)}px Orbitron,sans-serif`; ctx.textAlign='center';
  ctx.fillText(label,x,y+r+16);
  ctx.restore();
}
function drawKnob(x,y,r){
  ctx.save();
  ctx.shadowBlur=12; ctx.shadowColor='#00e5ff';
  ctx.fillStyle='rgba(0,229,255,0.55)';
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawAimLine(){
  const len=60+Math.sin(elapsed*6)*4;
  const ax=shard.x+Math.cos(shard.aimAngle)*len;
  const ay=shard.y+Math.sin(shard.aimAngle)*len;
  ctx.save();
  const locked = shard.aimLocked || shard.autoAimGrace<=0;
  ctx.strokeStyle=shard.aimLocked?'rgba(255,60,120,0.6)':'rgba(0,229,255,0.3)';
  ctx.lineWidth=1.5; ctx.setLineDash([5,5]);
  ctx.lineDashOffset=-elapsed*14;
  ctx.shadowColor=shard.aimLocked?'#ff3c78':'#00e5ff'; ctx.shadowBlur=4;
  ctx.beginPath(); ctx.moveTo(shard.x,shard.y); ctx.lineTo(ax,ay); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=shard.aimLocked?'rgba(255,60,120,0.8)':'rgba(0,229,255,0.7)';
  ctx.translate(ax,ay); ctx.rotate(shard.aimAngle);
  ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(-3,4); ctx.lineTo(-3,-4); ctx.closePath(); ctx.fill();
  ctx.restore();
}

// RENDER — tower
function drawTower(){
  ctx.save();
  const flash=tower.hitFlash>0?tower.hitFlash/0.3:0;
  const pulseScale=1+Math.sin(elapsed*4)*0.03;
  const radii=[28,20,13,7], colors=['#1a0840','#220a55','#2a0e6e','#33118a'];
  radii.forEach((r,i)=>{
    ctx.beginPath(); ctx.arc(CX,CY,r*pulseScale,0,Math.PI*2);
    ctx.fillStyle=flash>0?`rgba(255,60,120,${0.4+flash*0.5})`:colors[i];
    ctx.shadowBlur=flash>0?20:10; ctx.shadowColor=flash>0?'#ff3c78':'#6622cc';
    ctx.fill();
    ctx.strokeStyle='rgba(100,60,255,0.4)'; ctx.lineWidth=1; ctx.stroke();
  });
  const hf=tower.hp/tower.maxHp;
  ctx.shadowBlur=8;
  ctx.strokeStyle=hf>0.5?'#00ffaa':hf>0.25?'#ffaa00':'#ff3333';
  ctx.shadowColor=ctx.strokeStyle; ctx.lineWidth=3.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(CX,CY,33,-Math.PI/2,-Math.PI/2+Math.PI*2*hf); ctx.stroke();
  ctx.restore();
}

// PLAYER — ship geometry
function drawShipAt(x,y,angle,alpha){
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.translate(x,y); ctx.rotate(angle+Math.PI/2);
  const r=shard.radius;
  const od=shard.overdriveMode;
  const gc=od?'#ff4400':'#00e5ff', cc=od?'#ffaa00':'#00ffff';

  ctx.save();
  const bloom=ctx.createRadialGradient(0,0,r*0.3,0,0,r*1.8);
  bloom.addColorStop(0,od?'rgba(255,100,0,0.14)':'rgba(0,229,255,0.11)');
  bloom.addColorStop(1,'transparent');
  ctx.fillStyle=bloom; ctx.beginPath(); ctx.arc(0,0,r*1.8,0,Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.shadowBlur=14; ctx.shadowColor=gc; ctx.strokeStyle=gc; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(0,0,r*0.72,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=0.4; ctx.strokeStyle=cc; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(0,0,r*0.52,0,Math.PI*2); ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.shadowBlur=16; ctx.shadowColor=gc; ctx.strokeStyle=gc; ctx.lineWidth=2.5;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(0,r*0.72); ctx.lineTo(0,-r*1.6); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0,-r*1.6); ctx.lineTo(-r*0.38,-r*1.05);
  ctx.moveTo(0,-r*1.6); ctx.lineTo(r*0.38,-r*1.05);
  ctx.stroke();
  ctx.globalAlpha=0.7;
  ctx.beginPath();
  ctx.moveTo(-r*0.72,0); ctx.lineTo(-r*0.45,r*0.6);
  ctx.moveTo(r*0.72,0);  ctx.lineTo(r*0.45,r*0.6);
  ctx.stroke();
  ctx.restore();

  ctx.save();
  const og=ctx.createRadialGradient(0,0,0,0,0,r*0.38);
  og.addColorStop(0,'#ffffff'); og.addColorStop(0.4,cc);
  og.addColorStop(1,od?'rgba(255,80,0,0)':'rgba(0,229,255,0)');
  ctx.shadowBlur=20; ctx.shadowColor=cc; ctx.fillStyle=og;
  ctx.beginPath(); ctx.arc(0,0,r*0.38,0,Math.PI*2); ctx.fill();
  ctx.restore();

  if(shard.shieldHp>0){
    ctx.save();
    ctx.strokeStyle='rgba(100,200,255,0.75)'; ctx.lineWidth=3;
    ctx.shadowBlur=18; ctx.shadowColor='#88ddff';
    ctx.beginPath(); ctx.arc(0,0,r+8,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
}

// RENDER — enemy
function drawEnemy(en){
  ctx.save(); ctx.translate(en.x,en.y);
  const r=en.radius;
  if(en.stunTimer>0||en.hitTimer>0){const s=1+Math.sin(en.hitTimer*30)*0.1;ctx.scale(s,1/s);}
  ctx.rotate(en.wobble*0.06 + elapsed*(en.type==='brute'?0.4:en.type==='skitter'?2:0.8));
  ctx.shadowBlur=12; ctx.shadowColor=en.color; ctx.fillStyle=en.color;
  ePathEnemy(en); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.lineWidth=1; ctx.stroke();
  if(en.hp<en.maxHp){
    const bw=r*2.2;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(-bw/2,-r-8,bw,3.5);
    ctx.fillStyle=en.color; ctx.fillRect(-bw/2,-r-8,bw*(en.hp/en.maxHp),3.5);
  }
  ctx.restore();
}
function ePathEnemy(en){
  const r=en.radius, shape=en.shape;
  ctx.beginPath();
  if(shape==='ngon'){
    const sides=en.sides||6;
    for(let i=0;i<sides;i++){
      const a=i/sides*Math.PI*2-Math.PI/sides;
      i?ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r):ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath();
  } else if(shape==='tri'){ctx.moveTo(0,-r*1.2);ctx.lineTo(r,r*0.7);ctx.lineTo(-r,r*0.7);ctx.closePath();}
  else if(shape==='hex'){for(let i=0;i<6;i++){const a=i/6*Math.PI*2-Math.PI/6;i?ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r):ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();}
  else if(shape==='circ'){ctx.arc(0,0,r,0,Math.PI*1.82);ctx.lineTo(0,0);ctx.closePath();}
  else if(shape==='diamond'){ctx.moveTo(0,-r*1.3);ctx.lineTo(r*0.7,0);ctx.lineTo(0,r*1.3);ctx.lineTo(-r*0.7,0);ctx.closePath();}
}

// HUD
function drawHUD(){
  const fnt='Orbitron,sans-serif';
  ctx.save();
  ctx.font=`bold ${clamp(W*0.04,18,28)}px ${fnt}`;
  ctx.shadowColor='#00e5ff'; ctx.shadowBlur=12; ctx.fillStyle='#00e5ff';
  ctx.fillText(score,20,36);
  ctx.restore();

  ctx.save();
  ctx.font=`${clamp(W*0.028,12,18)}px ${fnt}`;
  ctx.fillStyle='rgba(0,229,255,0.7)'; ctx.textAlign='right';
  const m=Math.floor(elapsed/60),sec=Math.floor(elapsed%60).toString().padStart(2,'0');
  ctx.fillText(`${m}:${sec}`,W-16,30);
  ctx.font=`${clamp(W*0.022,10,14)}px ${fnt}`;
  ctx.fillStyle='rgba(0,180,255,0.5)';
  ctx.fillText(`WAVE ${waveStage+1}`,W-16,46);
  ctx.textAlign='left'; ctx.restore();

  // Next milestone bar
  let nextMs=-1, prevMs=0;
  for(let i=0;i<MILESTONES.length;i++){
    if(!milestonesHit.has(i)){nextMs=MILESTONES[i];prevMs=(i>0?MILESTONES[i-1]:0);break;}
  }
  if(nextMs>0){
    const barW=clamp(W*0.22,120,200), barH=5, bx=20, by=46;
    const prog=clamp((score-prevMs)/(nextMs-prevMs),0,1);
    ctx.save();
    ctx.fillStyle='rgba(0,229,255,0.12)'; ctx.fillRect(bx,by,barW,barH);
    ctx.shadowColor='#00e5ff'; ctx.shadowBlur=6;
    ctx.fillStyle='#00e5ff'; ctx.fillRect(bx,by,barW*prog,barH);
    ctx.font=`${clamp(W*0.02,9,12)}px ${fnt}`;
    ctx.fillStyle='rgba(0,229,255,0.55)';
    ctx.fillText(`NEXT UPGRADE: ${nextMs}`,bx,by+17);
    ctx.restore();
  }

  // Upgrade flash
  if(upgradeFlash.timer>0){
    const a=clamp(upgradeFlash.timer,0,1);
    ctx.save(); ctx.globalAlpha=a;
    ctx.font=`bold ${clamp(W*0.033,13,21)}px ${fnt}`;
    ctx.textAlign='center'; ctx.shadowColor='#00ff99'; ctx.shadowBlur=18; ctx.fillStyle='#00ff99';
    ctx.fillText('⬡  '+upgradeFlash.text+'  ⬡',CX,H*0.12);
    ctx.restore();
  }

  // Pulse cd arc
  const maxCd=pulse.maxCd*upg.pulseCdMult, frac=pulse.cd/maxCd;
  if(frac>0){
    ctx.save();
    ctx.shadowBlur=8; ctx.shadowColor='#00e5ff';
    ctx.strokeStyle='rgba(0,229,255,0.8)'; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(18+28,18+28,24,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-frac)); ctx.stroke();
    ctx.restore();
  }

  // Shot count indicator
  if(upg.shotCount>1){
    ctx.save();
    ctx.font=`${clamp(W*0.022,9,13)}px ${fnt}`;
    ctx.fillStyle='rgba(0,229,255,0.5)';
    ctx.fillText(`×${upg.shotCount} SHOTS`,20,H-14);
    ctx.restore();
  }

  // Shield
  if(shard.shieldHp===0&&shard.shieldRegenTime>0){
    const prog=clamp(shard.shieldRegenTimer/shard.shieldRegenTime,0,1);
    const bw=clamp(W*0.14,80,120);
    ctx.save();
    ctx.fillStyle='rgba(80,160,255,0.12)'; ctx.fillRect(20,H-28,bw,4);
    ctx.fillStyle='rgba(80,160,255,0.5)'; ctx.fillRect(20,H-28,bw*prog,4);
    ctx.font=`${clamp(W*0.018,8,11)}px ${fnt}`;
    ctx.fillStyle='rgba(100,200,255,0.5)';
    ctx.fillText('SHIELD',20,H-32);
    ctx.restore();
  }

  // bgPhase indicator (subtle)
  if(bgPhase>0){
    ctx.save();
    ctx.font=`${clamp(W*0.018,8,11)}px ${fnt}`;
    ctx.fillStyle='rgba(0,229,255,0.3)';
    ctx.textAlign='right';
    ctx.fillText(`PHASE ${bgPhase}`,W-16,H-14);
    ctx.textAlign='left';
    ctx.restore();
  }
}

// ── LOOP ────────────────────────────────────────────────────────────────────
let lastT = 0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,0.05);
  lastT=ts;
  if(state===S.PLAY){
    accumulator+=dt;
    while(accumulator>=FIXED_DT){update(FIXED_DT);accumulator-=FIXED_DT;}
  }
  render();
}
requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
</script>
</body>
