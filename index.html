<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Plasma Sheet Defense</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#04020f;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Orbitron',sans-serif}
#canvas{display:block;position:fixed;top:0;left:0;width:100vw;height:100vh;touch-action:none}
.ov{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:12px}
.hidden{display:none!important}
#overlay{background:rgba(4,2,15,.96);z-index:12}
.ov-title{font-size:clamp(1.5rem,6.5vw,3rem);font-weight:900;letter-spacing:4px;color:var(--accent,#00e5ff);text-transform:uppercase;margin-bottom:8px;text-align:center;text-shadow:0 0 28px var(--accent-glow,rgba(0,229,255,.8))}
.ov-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(.62rem,2vw,.88rem);color:#7eb8cc;text-align:center;max-width:360px;line-height:1.9;margin-bottom:18px}
.ov-sub b{color:var(--accent,#00e5ff)}
.big-btn{background:transparent;color:var(--accent,#00e5ff);border:1.5px solid var(--accent,#00e5ff);padding:13px 44px;font-size:.9rem;font-family:var(--hud-font,'Orbitron,sans-serif');letter-spacing:3px;text-transform:uppercase;cursor:pointer;box-shadow:0 0 16px var(--accent-glow,rgba(0,229,255,.3));transition:all .15s;margin:4px}
.big-btn:hover{background:rgba(var(--accent-rgb,0,229,255),.1);transform:scale(1.04)}
.big-btn:active{transform:scale(.97)}
#hs-list{font-family:'Share Tech Mono',monospace;color:#7eb8cc;font-size:clamp(.58rem,1.9vw,.76rem);margin:6px 0 12px;line-height:1.8;text-align:center}
#hs-list .hs-new{color:#00ff99;font-weight:bold}
#share-btn{margin-top:4px;background:transparent;color:#00ff99;border:1.5px solid #00ff99;padding:8px 24px;font-size:.75rem;font-family:'Orbitron',sans-serif;letter-spacing:3px;cursor:pointer;transition:all .15s}
#share-btn:hover{background:rgba(0,255,153,.1)}
#upgrade-overlay{background:rgba(2,0,14,.94);z-index:11;gap:16px}
.upg-title{font-size:clamp(.85rem,3.5vw,1.4rem);font-weight:900;letter-spacing:4px;color:#00ff99;text-transform:uppercase;text-align:center;text-shadow:0 0 16px rgba(0,255,153,.7)}
.upg-sub{font-family:'Share Tech Mono',monospace;color:#5fbfa0;font-size:clamp(.58rem,1.8vw,.78rem);letter-spacing:2px}
.upg-cards{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:0 12px;max-width:600px}
.upg-card{background:rgba(0,16,26,.94);border:1.5px solid rgba(0,229,255,.42);padding:14px 10px;min-width:100px;max-width:150px;flex:1;cursor:pointer;pointer-events:all;text-align:center;transition:transform .12s,border-color .12s,box-shadow .12s}
.upg-card:hover{border-color:var(--accent,#00e5ff);box-shadow:0 0 20px rgba(var(--accent-rgb,0,229,255),.45);transform:translateY(-3px)}
.upg-card:active{transform:scale(.95)}
.upg-card .ci{font-size:1.5rem;margin-bottom:6px}
.upg-card .cn{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;font-weight:700;color:var(--accent,#00e5ff)}
.upg-card .cd{font-size:.55rem;opacity:.6;margin-top:3px;color:#aad8e8;font-family:'Share Tech Mono',monospace}
#pause-overlay{background:rgba(4,2,15,.94);z-index:11;gap:10px}
.menu-row{display:flex;gap:9px;align-items:center;flex-wrap:wrap;justify-content:center;margin:2px 0}
.menu-tog{background:none;border:1.5px solid rgba(0,229,255,.3);color:rgba(0,229,255,.65);padding:6px 13px;font-family:'Orbitron',sans-serif;font-size:.65rem;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .1s}
.menu-tog.on{border-color:var(--accent,#00e5ff);color:var(--accent,#00e5ff);box-shadow:0 0 7px rgba(var(--accent-rgb,0,229,255),.22)}
.menu-tog.danger{border-color:rgba(255,60,60,.4);color:rgba(255,100,100,.75)}
#upgrade-pin{position:fixed;right:0;top:50%;z-index:9;background:rgba(0,20,15,.94);border:1.5px solid #00ff99;border-right:none;color:#00ff99;font-family:'Orbitron',sans-serif;font-size:.54rem;padding:11px 6px 11px 9px;letter-spacing:1px;cursor:pointer;pointer-events:all;text-transform:uppercase;box-shadow:-3px 0 16px rgba(0,255,153,.35);writing-mode:vertical-lr;transform:translateY(-50%) rotate(180deg);animation:pinP 1.4s infinite}
@keyframes pinP{0%,100%{box-shadow:-3px 0 16px rgba(0,255,153,.35)}50%{box-shadow:-3px 0 24px rgba(0,255,153,.7)}}
#boss-banner{position:fixed;top:15%;left:50%;transform:translateX(-50%);z-index:13;font-family:'Orbitron',sans-serif;font-size:clamp(.85rem,3.8vw,1.6rem);font-weight:900;letter-spacing:6px;color:#ff3333;text-transform:uppercase;text-shadow:0 0 16px rgba(255,50,50,.9);pointer-events:none;animation:bFlash .45s infinite}
@keyframes bFlash{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="overlay" class="ov">
  <div class="ov-title" id="main-title">Plasma Sheet<br>Defense</div>
  <div class="ov-sub" id="main-sub"><b>Drag</b> — ship IS your thumb<br><b>Left joystick</b> aims &amp; fires<br><b>Two-finger</b> · ◎ button = pulse</div>
  <div id="hs-list"></div>
  <button class="big-btn" id="play-btn">ENGAGE</button>
  <button id="share-btn" class="hidden">📤 SHARE SCORE</button>
</div>

<div id="upgrade-overlay" class="ov hidden">
  <div class="upg-title">⬡ SHIP UPGRADE ⬡</div>
  <div class="upg-sub">CHOOSE ONE</div>
  <div class="upg-cards" id="upg-cards"></div>
  <div class="upg-sub" id="upg-remain" style="margin-top:5px;color:#7eb8cc;font-size:.6rem"></div>
</div>

<div id="pause-overlay" class="ov hidden">
  <div class="ov-title" style="font-size:1.8rem">PAUSED</div>
  <button class="big-btn" id="resume-btn">RESUME</button>
  <div class="menu-row">
    <button class="menu-tog on" id="sfx-btn">SFX: ON</button>
    <button class="menu-tog on" id="music-btn">MUSIC: ON</button>
    <button class="menu-tog on" id="assist-btn">ASSIST: ON</button>
  </div>
  <div class="menu-row" id="theme-row">
    <span style="color:rgba(0,229,255,.5);font-size:.6rem;letter-spacing:2px">THEME:</span>
    <button class="menu-tog on" id="theme-0">DEFAULT</button>
    <button class="menu-tog" id="theme-1">SPACE TECH</button>
    <button class="menu-tog" id="theme-2">MCDO</button>
    <button class="menu-tog" id="theme-3">ANIME</button>
  </div>
  <button class="big-btn" id="restart-btn" style="font-size:.76rem;padding:9px 26px">RESTART RUN</button>
  <button class="menu-tog danger" id="hs-reset-btn">RESET HIGH SCORES</button>
</div>

<div id="boss-banner" class="hidden">⚠ ANOMALY DETECTED ⚠</div>
<button id="upgrade-pin" class="hidden">⬡ UPGRADE (1)</button>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════════════
// CANVAS / RESIZE
// ═══════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W=1,H=1,DPR=1,CX,CY,towerX,towerY;
let _resizePending=false;
function applyResize(){
  _resizePending=false;
  const vp=window.visualViewport;
  W=vp?vp.width:window.innerWidth;
  H=vp?vp.height:window.innerHeight;
  DPR=Math.min(window.devicePixelRatio||1,3);
  canvas.width=Math.round(W*DPR); canvas.height=Math.round(H*DPR);
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  CX=W/2; CY=H/2; towerX=W/2; towerY=H*0.65;
  if(typeof layoutControls==='function') layoutControls();
}
function scheduleResize(){if(!_resizePending){_resizePending=true;requestAnimationFrame(applyResize);}}
window.addEventListener('resize',scheduleResize);
window.addEventListener('orientationchange',scheduleResize);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',scheduleResize);
  window.visualViewport.addEventListener('scroll',scheduleResize);
}

// ═══════════════════════════════════════════════════════════════════════
// THEME PACKS (brands)
// ═══════════════════════════════════════════════════════════════════════
const THEMES = {
  default: {
    name:'DEFAULT',
    accent:'#00e5ff', accentRgb:'0,229,255', accentGlow:'rgba(0,229,255,.8)',
    accent2:'#00ff99', bgColors:[['#0d0625','#08031a','#020010'],['#022535','#011428','#000d20'],['#1a0530','#0e021e','#060012'],['#2a0810','#1a0508','#0e0203']],
    gridColor:'#3333aa', shipGlow:'#00e5ff', shipCore:'#00ffff',
    projColors:['#00e5ff','#ff00cc','#cc88ff','#ffd700'],
    pulseColor:'rgba(0,229,255,',
    hudFont:'Orbitron,sans-serif',
    enemySkin:{},
    particleColor:null,
    towerColors:['#1a0840','#220a55','#2a0e6e','#33118a'],
    effectLabel:'SHOCKWAVE',
  },
  spacetech: {
    name:'SPACE TECH',
    accent:'#88ccff', accentRgb:'136,204,255', accentGlow:'rgba(136,204,255,.85)',
    accent2:'#ffffff', bgColors:[['#000e22','#000814','#000408'],['#001030','#000c20','#000510'],['#001540','#000c28','#000618'],['#001a50','#001030','#00081e']],
    gridColor:'#002244', shipGlow:'#88ccff', shipCore:'#cceeff',
    projColors:['#88ccff','#ffffff','#aaddff','#ffffc8'],
    pulseColor:'rgba(136,204,255,',
    hudFont:'Share Tech Mono,monospace',
    enemySkin:{runner:'drone',splitter:'orb',tank:'heavydrone',skitter:'probe',dodger:'stealth',bruteNgon:'destroyer',anchored:'sentinel',shielded:'shieldorb',exploder:'bombot',healer:'medship'},
    particleColor:'#88ccff',
    towerColors:['#001030','#001848','#002060','#002878'],
    effectLabel:'PULSE BLAST',
  },
  mcdo: {
    name:"MC SPONSOR",
    accent:'#ffcc00', accentRgb:'255,204,0', accentGlow:'rgba(255,204,0,.8)',
    accent2:'#ff3300', bgColors:[['#1a0800','#120500','#080200'],['#200a00','#180700','#0e0400'],['#2a0e00','#220a00','#160600'],['#330f00','#280c00','#180800']],
    gridColor:'#442200', shipGlow:'#ffcc00', shipCore:'#ff9900',
    projColors:['#ffcc00','#ff6600','#ff3300','#ff0000'],
    pulseColor:'rgba(255,180,0,',
    hudFont:'Orbitron,sans-serif',
    enemySkin:{runner:'fries',splitter:'nugget',tank:'burger',skitter:'fry',dodger:'saucepkt',bruteNgon:'bigmac',anchored:'mcrib',shielded:'shaker',exploder:'ketchup',healer:'happymeal'},
    particleColor:'#ffcc00',
    towerColors:['#3a1200','#4a1800','#5a2000','#6a2800'],
    effectLabel:'SAUCE BLAST',
  },
  anime: {
    name:'ANIME ENERGY',
    accent:'#ff00aa', accentRgb:'255,0,170', accentGlow:'rgba(255,0,170,.85)',
    accent2:'#00ff44', bgColors:[['#0f0018','#080010','#040008'],['#140020','#0c0016','#06000c'],['#1a0030','#120020','#0a0015'],['#220040','#180030','#0e001a']],
    gridColor:'#330066', shipGlow:'#ff00aa', shipCore:'#cc00ff',
    projColors:['#ff00aa','#cc00ff','#ff44cc','#ffccff'],
    pulseColor:'rgba(255,0,170,',
    hudFont:'Orbitron,sans-serif',
    enemySkin:{runner:'sparkite',splitter:'burstcan',tank:'megacan',skitter:'bolt',dodger:'phantom',bruteNgon:'titancan',anchored:'colossus',shielded:'barrier',exploder:'grenade',healer:'energizer'},
    particleColor:'#ff00aa',
    towerColors:['#1a0030','#220040','#2a0050','#330060'],
    effectLabel:'LIGHTNING SURGE',
  },
};
let currentThemeId='default';
function T(){ return THEMES[currentThemeId]; }

function applyThemeCSS(){
  const t=T();
  document.documentElement.style.setProperty('--accent',t.accent);
  document.documentElement.style.setProperty('--accent-rgb',t.accentRgb);
  document.documentElement.style.setProperty('--accent-glow',t.accentGlow);
  document.documentElement.style.setProperty('--hud-font',t.hudFont);
}
function setTheme(id){
  currentThemeId=id;
  applyThemeCSS();
  // Update theme buttons
  ['default','spacetech','mcdo','anime'].forEach((k,i)=>{
    const b=document.getElementById('theme-'+i);
    if(b) b.classList.toggle('on',k===id);
  });
}

// ═══════════════════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════════════════
let audioCtx=null,masterGain=null,musicBus=null,sfxBus=null;
let sfxMuted=false,musicMuted=false;
function initAudio(){
  if(audioCtx){if(audioCtx.state==='suspended')audioCtx.resume();return;}
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain();masterGain.gain.value=1;masterGain.connect(audioCtx.destination);
    musicBus=audioCtx.createGain();musicBus.gain.value=0.55;musicBus.connect(masterGain);
    sfxBus=audioCtx.createGain();sfxBus.gain.value=1;sfxBus.connect(masterGain);
  }catch(e){}
}
function duckMusic(to=0.12,spd=0.4){if(musicBus)musicBus.gain.setTargetAtTime(musicMuted?0:to,audioCtx.currentTime,spd);}
function unduckMusic(spd=0.4){if(musicBus)musicBus.gain.setTargetAtTime(musicMuted?0:0.55,audioCtx.currentTime,spd);}
function tone(freq,dur,type='sine',vol=0.12){
  if(sfxMuted||!audioCtx)return;
  try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(sfxBus);o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);o.start();o.stop(audioCtx.currentTime+dur);}catch(e){}
}

// ═══════════════════════════════════════════════════════════════════════
// MATH
// ═══════════════════════════════════════════════════════════════════════
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by);}
function lerpAngle(a,b,t){let d=b-a;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return a+d*t;}
let _rngS=12345;
function rng(){_rngS^=_rngS<<13;_rngS^=_rngS>>17;_rngS^=_rngS<<5;return(_rngS>>>0)/0xFFFFFFFF;}

// ═══════════════════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════════════════
const S={START:0,PLAY:1,UPGRADE:2,PAUSE:3,OVER:4};
let state=S.START;
let score=0,elapsed=0,waveStage=0;
let shake={x:0,y:0,t:0};
let bgPhase=0;
let combo=1,comboTimer=0,lastKillTime=0;
let upgradePendingCount=0;
let aimAssistOn=true;
let lastFinalScore=0,lastFinalTime=0;

// ═══════════════════════════════════════════════════════════════════════
// TOWER HEAL RULES
// ═══════════════════════════════════════════════════════════════════════
let tower={hp:100,maxHp:100,radius:28,regenTimer:0,hitFlash:0,healGlow:0};
function towerHeal(amount,enemyMass){
  // Nerf: base heal much smaller, diminishing returns above 70% hp
  let heal=Math.min(2.5, 0.8+enemyMass*0.25);
  if(tower.hp/tower.maxHp>0.7) heal*=0.35;
  tower.hp=Math.min(tower.maxHp,tower.hp+heal);
  tower.healGlow=0.6;
  spawnHealFX(towerX,towerY);
}

// ═══════════════════════════════════════════════════════════════════════
// PLAYER
// ═══════════════════════════════════════════════════════════════════════
let shard={
  x:0,y:0,aimAngle:-Math.PI/2,aimLocked:false,autoAimGrace:0,
  fireCooldown:0,fireRate:0.55,radius:26,isDragged:false,
  trailX:[],trailY:[],hasPlasmaTrail:false,trailDmgMult:1,
  overdriveMode:false,overdriveTimer:0,
  shieldHp:0,shieldRegenTime:12,shieldRegenTimer:0,
};

// ═══════════════════════════════════════════════════════════════════════
// UPGRADES
// ═══════════════════════════════════════════════════════════════════════
let upg={
  fireRate:1,dartSpeed:1,knockbackMult:1,pulseCdMult:1,
  shotCount:1,pierce:false,slowAura:false,
  ghostActive:false,ghostLife:0,ghostX:0,ghostY:0,
  ramDmg:0.35, // NERF: was 0.6
  projTier:1,
};
const MILESTONES=[100,300,600,1000,1600,2500,3800,5500,7500,10000];
let milestonesHit=new Set();
let upgradeFlash={text:'',timer:0};

const UPG_POOL=[
  {icon:'🔥',name:'Fire Rate +15%',    desc:'Stacks multiplicatively',      apply:()=>{upg.fireRate*=0.85;}},
  {icon:'⚡',name:'Dart Speed +15%',   desc:'Faster projectiles',           apply:()=>{upg.dartSpeed*=1.15;}},
  {icon:'💥',name:'Ram Damage +0.3',   desc:'Body collision (nerfed base)', apply:()=>{upg.ramDmg+=0.3;}},
  {icon:'🌀',name:'Knockback +20%',    desc:'Heavier impacts',              apply:()=>{upg.knockbackMult*=1.2;}},
  {icon:'◈', name:'+1 Shot',           desc:'Up to 4 total shots',          canShow:()=>upg.shotCount<4, apply:()=>{upg.shotCount=Math.min(4,upg.shotCount+1);}},
  {icon:'◆', name:'Pierce Rounds',     desc:'Darts pass through foes',      canShow:()=>!upg.pierce, apply:()=>{upg.pierce=true;}},
  {icon:'🌊',name:'Plasma Trail',      desc:'Wake damages enemies',         canShow:()=>!shard.hasPlasmaTrail, apply:()=>{shard.hasPlasmaTrail=true;}},
  {icon:'〰',name:'Trail Dmg +25%',    desc:'Stronger plasma wake',         canShow:()=>shard.hasPlasmaTrail, apply:()=>{shard.trailDmgMult*=1.25;}},
  {icon:'🛡',name:'Shield Regen',      desc:'Absorbs 1 hit · recharges',   apply:()=>{shard.shieldHp=1;shard.shieldRegenTime=Math.max(3,(shard.shieldRegenTime||12)-2);}},
  {icon:'◎', name:'Pulse CD -10%',     desc:'Shockwave charges faster',     apply:()=>{upg.pulseCdMult*=0.90;}},
  {icon:'👻',name:'Ghost Ship',        desc:'Twin fires alongside you',     canShow:()=>!upg.ghostActive, apply:()=>{spawnGhost();}},
  {icon:'❄', name:'Slow Aura',         desc:'Chills nearby enemies',        canShow:()=>!upg.slowAura, apply:()=>{upg.slowAura=true;}},
  {icon:'🔮',name:'Plasma Amplifier',  desc:'Boosts projectile tier',       apply:()=>{upg.projTier=Math.min(4,upg.projTier+1);}},
  {icon:'☄', name:'Overdrive',         desc:'8s burst fire mode',           apply:()=>{shard.overdriveMode=true;shard.overdriveTimer=8;}},
];

// ═══════════════════════════════════════════════════════════════════════
// PULSE CHARGE RULES (slower + kill-based gain)
// ═══════════════════════════════════════════════════════════════════════
let pulse={cd:0, maxCd:14, rings:[]}; // NERF: was 8.5 → 14 (more strategic)
const PULSE_BASE_FORCE=850;
const PULSE_RING_THICKNESS=26;
const PULSE_RING_SPEED=380;

function triggerPulse(){
  if(state!==S.PLAY||pulse.cd>0)return;
  pulse.cd=pulse.maxCd*upg.pulseCdMult;
  pulse.rings.push({r:tower.radius,speed:PULSE_RING_SPEED,maxR:Math.max(W,H)*0.78,hitSet:new Set()});
  tone(180,0.28,'sine',0.18);
  // theme-specific SFX
  if(currentThemeId==='mcdo') tone(550,0.12,'square',0.1);
  if(currentThemeId==='anime') tone(440,0.2,'sawtooth',0.12);
}

// Kill-based pulse recharge
function pulseFillOnKill(enemyMass){
  // Reduced gain per kill; mass-gated but capped lower so boss farming doesn't trivialize
  const gain=clamp(0.04+enemyMass*0.008, 0.04, 0.12);
  pulse.cd=Math.max(0, pulse.cd-gain);
}

// ═══════════════════════════════════════════════════════════════════════
// BOSSES / EVENTS
// ═══════════════════════════════════════════════════════════════════════
const BOSS_THRESHOLDS=[1800,3600,6000];
let bossEventsTriggered=new Set();
let bossActive=false,bossTimer=0,bossSpawnTimer=0;
let bossBannerTimer=0;
let bossId=9000;

function startBossEvent(idx){
  bossEventsTriggered.add(idx);
  bossActive=true; bossTimer=30; bossBannerTimer=3.5; bossSpawnTimer=2.0;
  document.getElementById('boss-banner').classList.remove('hidden');
  tone(120,1.2,'sawtooth',0.2);
  musicIntensityBoost=2.5;
  console.log('[BOSS] Event started idx',idx,'score',score,'bossTimer=30');
}
function spawnBoss(idx){
  // Place boss at safe radius, clamped so it's always on screen
  const a=rng()*Math.PI*2;
  const sr=clamp(Math.min(W,H)*0.42, 120, Math.min(W,H)*0.48);
  const ex=clamp(towerX+Math.cos(a)*sr, 60, W-60);
  const ey=clamp(towerY+Math.sin(a)*sr, 60, H-60);
  const type=idx%2===1?'phaseDodger':'sentinelBrute';
  const def=EDEFS[type];
  const boss={
    id:bossId++,type,isBoss:true,x:ex,y:ey,vx:0,vy:0,

    color:def.color,radius:def.radius,speed:def.speed,reward:def.reward,
    shape:def.shape,sides:def.sides||8,extraDmg:def.extraDmg,mass:def.mass,_rm:false,
    dodgeCd:0,zigTimer:0,zigDir:1,teleportCd:idx%2===1?4:0,teleportGlow:0,
    shieldHp:0,shieldMax:0,shieldTimer:0,healAura:false,explodeOnDeath:false,bodyHitCd:0,
    anchored:type==='sentinelBrute',healPulse:null,spiralDir:1,

// Gaussian params
const GAUSS_DEFS={
  runner:   {peak:250,  sigma:550, bw:1.10,fw:0.12,unlock:0},
  splitter: {peak:900,  sigma:840, bw:0.75,fw:0.06,unlock:0},
  leech:    {peak:1400, sigma:900, bw:0.55,fw:0.04,unlock:0},
  tank:     {peak:2100, sigma:1100,bw:0.60,fw:0.03,unlock:0},
  skitter:  {peak:2600, sigma:920, bw:0.65,fw:0.02,unlock:450},
  dodger:   {peak:3200, sigma:1080,bw:0.50,fw:0.015,unlock:900},
  bruteNgon:{peak:4200, sigma:1280,bw:0.45,fw:0.008,unlock:1200},
  anchored: {peak:2800, sigma:1050,bw:0.42,fw:0.006,unlock:800},
  shielded: {peak:1800, sigma:950, bw:0.50,fw:0.015,unlock:500},
  exploder: {peak:2200, sigma:980, bw:0.48,fw:0.012,unlock:600},
  healer:   {peak:3000, sigma:1100,bw:0.38,fw:0.008,unlock:1000},
  spiralHunter:{peak:3800,sigma:1200,bw:0.42,fw:0.005,unlock:1500},
};
function gaussW(s,g){
  const sig=g.sigma*(1+0.12*Math.min(1,s/5000));
  return g.fw+g.bw*Math.exp(-Math.pow(s-g.peak,2)/(2*sig*sig));
}

// Threat curve (exponential)
function getThreat(){return elapsed*0.018+score*0.00045;}
function getThreat2(){return Math.pow(getThreat(),1.35);}

let spawnTimer=2.0;
let recentKills=[];      // timestamps
let recentKillsScore=0;  // score snapshot
let recentScoreTime=0;
let dangerNearTowerCount=0;
let pacingBoost=false, pacingBoostTimer=0;
let safetyValveTimer=0;

function getSpawnInterval(){
  const t2=getThreat2();
  let iv=clamp(1.45-0.08*t2,0.28,1.45);
  if(bossActive) iv*=2.1;
  if(pacingBoost) iv*=0.84;
  if(safetyValveTimer>0) iv*=1.35; // safety valve when tower low
  return iv;
}
function getEnemyCap(){return Math.floor(clamp(18+2.8*getThreat2(),18,65));}
function getHpMult(){return clamp(1+0.03*getThreat2(),1,3.2);}
function getSpdMult(){return clamp(1+0.015*getThreat2(),1,2.2);}

function pickEnemyType(){
  const types=Object.keys(GAUSS_DEFS).filter(k=>score>=GAUSS_DEFS[k].unlock&&EDEFS[k]);
  let total=0;
  const ws=types.map(k=>{const w=gaussW(score,GAUSS_DEFS[k]);total+=w;return w;});
  let r=rng()*total;
  for(let i=0;i<types.length;i++){r-=ws[i];if(r<=0)return types[i];}
  return 'runner';
}

function makeEnemy(type, ex, ey){
  if(!EDEFS[type]) type='runner';
  const d=EDEFS[type];
  const hm=getHpMult(),sm=getSpdMult(),t2=getThreat2();
  const sides=type==='bruteNgon'?clamp(7+Math.floor(t2*0.5),7,14):(d.sides||3);
  const shieldHP=(type==='shielded'||type==='sentinelBrute')?3+Math.floor(t2*0.3):0;
  return {
    id:enemyId++,type,isBoss:false,
    x:ex,y:ey,vx:0,vy:0,
    hp:d.hp*hm,maxHp:d.hp*hm,
    hitTimer:0,stunTimer:0,wobble:rng()*Math.PI*2,
    color:d.color,radius:d.radius+(type==='bruteNgon'?Math.floor(t2*0.35):0),
    speed:d.speed*sm,reward:d.reward,shape:d.shape,sides,
    extraDmg:d.extraDmg,mass:d.mass+(type==='bruteNgon'?t2*0.18:0),
    _rm:false,dodgeCd:0,zigTimer:rng()*0.8,zigDir:rng()>.5?1:-1,
    teleportCd:0,teleportGlow:0,
    shieldHp:shieldHP,shieldMax:shieldHP,shieldTimer:0,
    healAura:type==='healer',explodeOnDeath:type==='exploder',
    bodyHitCd:0, // DAMAGE COLLISION BALANCE
    anchored:type==='anchored'||type==='sentinelBrute',
    healPulse:type==='healer'?0:null,
    spiralDir:rng()>.5?1:-1, // spiral direction per-instance
  };
}
function spawnEnemy(){
  if(enemies.filter(e=>!e._rm).length>=getEnemyCap())return;
  const a=rng()*Math.PI*2;
  const sr=Math.max(W,H)*0.72;
  const ex=towerX+Math.cos(a)*sr,ey=towerY+Math.sin(a)*sr;
  const type=tower.hp<tower.maxHp*0.25?'runner':pickEnemyType();
  enemies.push(makeEnemy(type,ex,ey));
}
function spawnFodderPack(){
  const n=3+Math.floor(rng()*3);
  for(let i=0;i<n;i++){
    const a=rng()*Math.PI*2,sr=(0.68+rng()*0.08)*Math.max(W,H);
    enemies.push(makeEnemy('runner',towerX+Math.cos(a)*sr,towerY+Math.sin(a)*sr));
  }
}
function spawnEscortPack(){
  // 1 anchored + 3 skitters
  const a=rng()*Math.PI*2,sr=Math.max(W,H)*0.7;
  const bx=towerX+Math.cos(a)*sr,by=towerY+Math.sin(a)*sr;
  if(score>=GAUSS_DEFS.anchored.unlock) enemies.push(makeEnemy('anchored',bx,by));
  for(let i=0;i<3;i++){
    const off=(rng()-.5)*80;
    enemies.push(makeEnemy('skitter',bx+off,by+off));
  }
}

// ENEMY TYPES + BEHAVIORS
// ═══════════════════════════════════════════════════════════════════════
const EDEFS={
  runner:       {color:'#ff4488',radius:8,  hp:2,   speed:65, reward:5,  shape:'tri',     sides:3, extraDmg:0, mass:1},
  splitter:     {color:'#cc44ff',radius:10, hp:5,   speed:48, reward:10, shape:'circ',    sides:0, extraDmg:0, mass:1.5},
  leech:        {color:'#ff6633',radius:9,  hp:3,   speed:55, reward:8,  shape:'diamond', sides:4, extraDmg:2, mass:2},
  tank:         {color:'#ff8c00',radius:14, hp:10,  speed:28, reward:15, shape:'hex',     sides:6, extraDmg:0, mass:5},
  skitter:      {color:'#ffee00',radius:6,  hp:2,   speed:95, reward:6,  shape:'tri',     sides:3, extraDmg:0, mass:0.6},
  dodger:       {color:'#00ffaa',radius:10, hp:4,   speed:52, reward:12, shape:'tri',     sides:3, extraDmg:0, mass:1.2},
  bruteNgon:    {color:'#ff3300',radius:18, hp:20,  speed:20, reward:25, shape:'ngon',    sides:9, extraDmg:1, mass:8},
  anchored:     {color:'#aaaaff',radius:16, hp:28,  speed:16, reward:30, shape:'ngon',    sides:8, extraDmg:2, mass:25},
  shielded:     {color:'#44ddff',radius:12, hp:6,   speed:38, reward:18, shape:'hex',     sides:6, extraDmg:0, mass:3},
  exploder:     {color:'#ff4400',radius:11, hp:4,   speed:44, reward:14, shape:'circ',    sides:0, extraDmg:0, mass:2},
  healer:       {color:'#44ff88',radius:10, hp:5,   speed:32, reward:20, shape:'diamond', sides:4, extraDmg:0, mass:1.5},
  sentinelBrute:{color:'#ff2200',radius:28, hp:95,  speed:14, reward:80, shape:'ngon',    sides:12,extraDmg:3, mass:20},
  phaseDodger:  {color:'#aa00ff',radius:16, hp:55,  speed:40, reward:70, shape:'tri',     sides:3, extraDmg:1, mass:4},
  spiralHunter: {color:'#ff55ff',radius:11, hp:8,   speed:76, reward:28, shape:'ngon',    sides:5, extraDmg:0, mass:2.5},
};

let enemies=[],enemyId=0;

function updateEnemy(en,dt){
  if(en.hitTimer>0) en.hitTimer-=dt;
  if(en.bodyHitCd>0) en.bodyHitCd-=dt; // DAMAGE COLLISION BALANCE
  if(en.stunTimer>0){en.stunTimer-=dt;en.vx*=0.78;en.vy*=0.78;return;}

  const dx=towerX-en.x,dy=towerY-en.y,d=Math.hypot(dx,dy)||1;
  let sm=1;
  if(upg.slowAura&&dist(en.x,en.y,shard.x,shard.y)<82+en.radius) sm=0.38;

  // Shield timer (shielded enemy regenerates shield slowly)
  if(en.shieldHp<en.shieldMax&&en.shieldMax>0){
    en.shieldTimer+=dt;
    if(en.shieldTimer>8){en.shieldHp=Math.min(en.shieldMax,en.shieldHp+1);en.shieldTimer=0;}
  }

  // Healer aura
  if(en.healAura){
    en.healPulse=(en.healPulse||0)+dt;
    if(en.healPulse>2.5){
      en.healPulse=0;
      enemies.forEach(other=>{
        if(other===en||other._rm) return;
        if(dist(en.x,en.y,other.x,other.y)<100){
          other.hp=Math.min(other.maxHp,other.hp+other.maxHp*0.06);
          other.speed=Math.min(other.speed*1.15,other.speed*1.15); // brief speed boost
        }
      });
    }
  }

  // Dodger / phaseDodger
  if(en.type==='dodger'||en.type==='phaseDodger'){
    if(en.dodgeCd>0) en.dodgeCd-=dt;
    else{
      const t2=getThreat2();
      for(const p of projectiles){
        if(p.dead)continue;
        const pdx=en.x-p.x,pdy=en.y-p.y,pd=Math.hypot(pdx,pdy);
        if(pd>160)continue;
        const pvl=Math.hypot(p.vx,p.vy)||1;
        const dot=(p.vx*(en.x-p.x)+p.vy*(en.y-p.y))/(pvl*pd);
        if(dot>0.65){
          const str=50+t2*5,s=rng()>.5?1:-1;
          en.vx+=(-p.vy/pvl)*s*str; en.vy+=(p.vx/pvl)*s*str;
          en.dodgeCd=0.38; break;
        }
      }
    }
    if(en.type==='phaseDodger'){
      if(en.teleportCd>0) en.teleportCd-=dt;
      en.teleportGlow=Math.max(0,en.teleportGlow-dt*2);
      if(en.teleportCd<=0&&en.hp<en.maxHp*0.7){
        const a=rng()*Math.PI*2,r=55+rng()*75;
        en.x=clamp(en.x+Math.cos(a)*r,0,W);en.y=clamp(en.y+Math.sin(a)*r,0,H);
        en.teleportCd=5+rng()*4;en.teleportGlow=1;
      }
    }
  }
  // Skitter
  if(en.type==='skitter'){
    en.zigTimer-=dt;
    if(en.zigTimer<=0){en.zigDir*=-1;en.zigTimer=0.28+rng()*0.5;}
    const t2=getThreat2();
    en.vx+=(-dy/d)*en.zigDir*(38+t2*4)*dt;
    en.vy+=(dx/d)*en.zigDir*(38+t2*4)*dt;
  }

  // SpiralHunter — predictive dodge + spiral path
  if(en.type==='spiralHunter'){
    if(en.dodgeCd>0) en.dodgeCd-=dt;
    else{
      for(const p of projectiles){
        if(p.dead)continue;
        const pdx=en.x-p.x,pdy=en.y-p.y,pd=Math.hypot(pdx,pdy);
        if(pd>140)continue;
        const pvl=Math.hypot(p.vx,p.vy)||1;
        const dot=(p.vx*(en.x-p.x)+p.vy*(en.y-p.y))/(pvl*(pd||1));
        if(dot>0.68){
          const str=65,s=en.spiralDir;
          en.vx+=(-p.vy/pvl)*s*str; en.vy+=(p.vx/pvl)*s*str;
          en.dodgeCd=0.55; break;
        }
      }
    }
  }

  // Compute movement direction (spiral for spiralHunter, tower-direct for others)
  let moveDx=dx/d, moveDy=dy/d;
  if(en.type==='spiralHunter'){
    const maxR=Math.max(W,H)*0.58;
    const tFrac=clamp(d/maxR,0,1); // 1=far, 0=close
    // tangent perpendicular to radial, sign = spiralDir
    const tanX=(-dy/d)*en.spiralDir, tanY=(dx/d)*en.spiralDir;
    // player bias (minor)
    const ppx=shard.x-en.x,ppy=shard.y-en.y,ppd=Math.hypot(ppx,ppy)||1;
    const bias=0.10;
    let mx=dx/d*(1-tFrac*0.45)+tanX*(tFrac*0.95)+(ppx/ppd)*bias;
    let my=dy/d*(1-tFrac*0.45)+tanY*(tFrac*0.95)+(ppy/ppd)*bias;
    const ml=Math.hypot(mx,my)||1;
    moveDx=mx/ml; moveDy=my/ml;
  }

  const ms=en.speed*sm;
  en.vx+=(moveDx*ms-en.vx)*0.08;
  en.vy+=(moveDy*ms-en.vy)*0.08;
  en.vx*=0.92; en.vy*=0.92;
  en.x+=en.vx*dt; en.y+=en.vy*dt;
  en.wobble+=dt*2.5;

  // Tower hit
  if(dist(en.x,en.y,towerX,towerY)<tower.radius+en.radius){
    tower.hp-=5+en.extraDmg;tower.hitFlash=0.3;
    shake.x=(rng()-.5)*6;shake.y=(rng()-.5)*6;shake.t=0.12;
    tone(80,0.18,'sawtooth',0.2);
    if(en.type==='splitter') doSplit(en);
    if(en.type==='exploder') spawnExploderBurst(en.x,en.y);
    en._rm=true;
    if(tower.hp<=0) gameOver();
  }
}

function doSplit(en){
  for(let i=0;i<2;i++){
    const a=rng()*Math.PI*2;
    enemies.push(makeEnemy('runner',en.x+Math.cos(a)*12,en.y+Math.sin(a)*12));
  }
}
function spawnExploderBurst(x,y){
  // Radial damage to tower and particles
  tower.hp-=8; tower.hitFlash=0.5;
  spawnPlasmaExplosion(x,y,'#ff4400');
  // Push nearby enemies outward (chain effect)
  enemies.forEach(en=>{
    if(en._rm) return;
    const d=dist(en.x,en.y,x,y);
    if(d<90){const nx=(en.x-x)/(d||1),ny=(en.y-y)/(d||1);en.vx+=nx*200;en.vy+=ny*200;}
  });
}

// ═══════════════════════════════════════════════════════════════════════
// DAMAGE + COLLISION BALANCE
// ═══════════════════════════════════════════════════════════════════════
function shardBump(en,sx,sy){
  if(en.hitTimer>0) return;
  const d=dist(en.x,en.y,sx,sy),r=shard.radius+en.radius;
  if(d>=r) return;
  const nx=(en.x-sx)/(d||1),ny=(en.y-sy)/(d||1);

  // Anchored enemies: near-zero knockback and near-zero body damage
  const sentinelMult=en.type==='sentinelBrute'?0.1:1;
  const anchorMult=en.anchored?0.08:1;
  const knockMult=anchorMult*sentinelMult;

  const impulse=(380*upg.knockbackMult)/(en.mass||1)*knockMult;
  en.vx+=nx*impulse; en.vy+=ny*impulse;
  en.stunTimer=0.12; // reduced stun (was 0.18)
  en.hitTimer=0.18;
  en.x+=nx*(r-d); en.y+=ny*(r-d);

  // Body damage: NERFED, anchored=0, per-enemy cooldown 0.35s
  if(en.bodyHitCd<=0){
    const bodyDmgMult=en.anchored?0:en.shieldHp>0?0.2:1;
    if(bodyDmgMult>0){
      hitEnemy(en,upg.ramDmg*bodyDmgMult,false);
      en.bodyHitCd=0.35;
    }
  }
  tone(300,0.06,'triangle',0.10);
}

function hitEnemy(en,dmg,fromProjectile=true){
  if(en._rm) return;
  // Shield absorbs projectile hits
  if(fromProjectile&&en.shieldHp>0){
    en.shieldHp--;
    spawnImpact(en.x,en.y,'#88eeff');
    tone(800,0.04,'square',0.08);
    return;
  }
  en.hp-=dmg*getTierDmg();
  spawnImpact(en.x,en.y,en.color);
  if(en.hp<=0) killEnemy(en);
}

function killEnemy(en){
  if(en._rm) return; en._rm=true;
  // Combo multiplier (max x1.7, decay if no kill in 2s)
  const now=elapsed;
  if(now-lastKillTime<2.0) combo=Math.min(1.7,combo+0.12);
  else combo=1;
  lastKillTime=now;
  const reward=Math.round(en.reward*combo);
  score+=reward;
  recentKills.push(elapsed);

  if(en.type==='splitter') doSplit(en);
  if(en.type==='exploder') spawnExploderBurst(en.x,en.y);
  spawnPlasmaExplosion(en.x,en.y, T().particleColor||en.color);
  tone(500,0.06,'triangle',0.09);

  // Kill-based pulse fill (small)
  pulseFillOnKill(en.mass);

  // Tower heal on heavy kills (nerfed)
  if(en.mass>=4) towerHeal(0,en.mass);

  // Boss rewards
  if(en.isBoss){
    score+=50; tower.hp=Math.min(tower.maxHp,tower.hp+10); // reduced from +15
    upgradePendingCount++; updateUpgradePin(); tower.healGlow=0.8;
    bossActive=false;
  }

  // Milestone
  MILESTONES.forEach((ms,i)=>{
    if(!milestonesHit.has(i)&&score>=ms){
      milestonesHit.add(i); bgPhase=milestonesHit.size;
      upgradePendingCount++; updateUpgradePin();
    }
  });

  // Boss event
  BOSS_THRESHOLDS.forEach((th,idx)=>{
    if(!bossEventsTriggered.has(idx)&&score>=th&&!bossActive) startBossEvent(idx);
  });
}

let projectiles=[];
function getTierColor(){const t=T();return t.projColors[clamp(upg.projTier-1,0,3)];}
function getTierDmg(){return[1,1.4,2.0,3.0][clamp(upg.projTier-1,0,3)];}

function fireDart(x,y,angle){
  const spr=(rng()-.5)*0.11,spd=340*upg.dartSpeed;
  const a=angle+spr;
  projectiles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1.4,dead:false,pierced:false});
}
function doFireShot(x,y,angle){
  const c=upg.shotCount,spread=0.20;
  for(let i=0;i<c;i++) fireDart(x,y,angle+(i-(c-1)/2)*spread);
  if(shard.overdriveMode){fireDart(x,y,angle+0.55);fireDart(x,y,angle-0.55);}
}

// MUSIC ENGINE
// ═══════════════════════════════════════════════════════════════════════
let musicScheduled=0,beatIdx=0,musicTimer=null,musicIntensityBoost=0;
const TAB_PAT16=[3,0,0,1,2,0,1,1,1,0,2,0,2,0,1,2];
const ARP_FREQS=[220,261.6,329.6,369.9,440,523.2,369.9,293.7];

function getMusicBPM(){return 116+Math.min(bgPhase*14,56)+Math.min(musicIntensityBoost*18,36);}
function scheduleNote(type,t,freq,vol){
  if(!audioCtx||musicMuted) return;
  try{
    if(type==='tabla'){
      const o=audioCtx.createOscillator(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter();
      f.type='bandpass';f.frequency.value=freq*1.5;f.Q.value=4;
      o.connect(f);f.connect(g);g.connect(musicBus);
      o.frequency.setValueAtTime(freq*2.2,t);o.frequency.exponentialRampToValueAtTime(freq*0.55,t+0.14);
      g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
      o.start(t);o.stop(t+0.24);
    }else if(type==='bass'){
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine';o.frequency.value=freq;o.connect(g);g.connect(musicBus);
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.015);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.30);
      o.start(t);o.stop(t+0.32);
    }else if(type==='snare'){
      const o=audioCtx.createOscillator(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter();
      o.type='sawtooth';o.frequency.value=190;f.type='highpass';f.frequency.value=1800;
      o.connect(f);f.connect(g);g.connect(musicBus);
      g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.09);
      o.start(t);o.stop(t+0.11);
    }else if(type==='arp'){
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='triangle';o.frequency.value=freq;o.connect(g);g.connect(musicBus);
      g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.17);
      o.start(t);o.stop(t+0.19);
    }
  }catch(e){}
}
function runMusic(){
  if(!audioCtx||musicMuted){musicTimer=setTimeout(runMusic,80);return;}
  const bpm=getMusicBPM(),stepDur=60/bpm/4,AHEAD=0.22;
  const ph=bgPhase,ib=Math.min(musicIntensityBoost,1);
  while(musicScheduled<audioCtx.currentTime+AHEAD){
    const step=beatIdx%16,bar=Math.floor(beatIdx/16)%4;
    const tv=TAB_PAT16[step];
    if(tv>0) scheduleNote('tabla',musicScheduled,[200,170,150][Math.min(2,ph)],[0,0.05,0.08,0.115][tv]+ib*0.03);
    const bSteps=[[0,8],[0,6,8,12],[0,4,8,10,12],[0,4,8,10,12,14]][Math.min(3,ph)];
    if(bSteps.includes(step)) scheduleNote('bass',musicScheduled,[55,55,82.4,65.4,41.2][step%5],0.10+ph*0.022+ib*0.03);
    if(step===4||step===12) scheduleNote('snare',musicScheduled,0,0.055+ph*0.01+ib*0.02);
    if(ph>=3&&(step===2||step===14)) scheduleNote('snare',musicScheduled,0,0.032);
    if(ph>=1){
      const dens=ph>=3?1:2;
      if(step%dens===0){
        const idx=(Math.floor(step/dens)+bar*4)%ARP_FREQS.length;
        scheduleNote('arp',musicScheduled,ARP_FREQS[idx]*(ph>=2?2:1),0.025+ph*0.005+ib*0.01);
      }
    }
    beatIdx++;musicScheduled+=stepDur;
  }
  if(musicIntensityBoost>0) musicIntensityBoost=Math.max(0,musicIntensityBoost-0.016);
  musicTimer=setTimeout(runMusic,50);
}
function startMusic(){
  if(musicTimer) clearTimeout(musicTimer);
  beatIdx=0; initAudio();
  if(!audioCtx){musicTimer=setTimeout(runMusic,200);return;}
  musicScheduled=audioCtx.currentTime+0.1;
  musicTimer=setTimeout(runMusic,0);
}

function layoutControls(){controls.aim.x=26+controls.aim.r;controls.aim.y=H-26-controls.aim.r;}
function inCircle(px,py,cx,cy,r){const dx=px-cx,dy=py-cy;return dx*dx+dy*dy<=r*r;}

const ptrs={};
canvas.addEventListener('pointerdown',onPD,{passive:false});

function onPD(e){
  e.preventDefault(); initAudio();
  ptrs[e.pointerId]={x:e.clientX,y:e.clientY};
  if(state!==S.PLAY) return;
  const x=e.clientX,y=e.clientY;
  if(!controls.aim.active&&inCircle(x,y,controls.aim.x,controls.aim.y,controls.aim.r*1.15)){
    controls.aim.active=true;controls.aim.pid=e.pointerId;controls.aim.dx=0;controls.aim.dy=0;
    shard.aimLocked=true;shard.autoAimGrace=0;manualFireImmediate();shard.fireCooldown=0;return;
  }
  if(Object.keys(ptrs).length>=2){triggerPulse();return;}
  if(!controls.move.active){
    controls.move.active=true;controls.move.pid=e.pointerId;
    controls.move.rawX=x;controls.move.rawY=y;shard.isDragged=true;
    shard.x=clamp(x,shard.radius,W-shard.radius);
    shard.y=clamp(y,shard.radius,H-shard.radius);
  }
}
function onPM(e){
  e.preventDefault();
  const p=ptrs[e.pointerId];if(!p)return;
  p.x=e.clientX;p.y=e.clientY;
  if(state!==S.PLAY)return;
  const x=e.clientX,y=e.clientY;
  if(controls.aim.active&&e.pointerId===controls.aim.pid){
    let dx=x-controls.aim.x,dy=y-controls.aim.y;
    const len=Math.hypot(dx,dy)||1,max=controls.aim.r*0.9,k=Math.min(1,max/len);
    dx*=k;dy*=k;controls.aim.dx=dx;controls.aim.dy=dy;
    const mag=Math.hypot(dx,dy);
    if(mag>8){
      const manAngle=Math.atan2(dy,dx);
      if(aimAssistOn){
        const ne=nearestEnemy(shard.x,shard.y);
        if(ne){
          const autoAngle=Math.atan2(ne.y-shard.y,ne.x-shard.x);
          const assistStr=clamp(1-(mag/(controls.aim.r*0.9))*0.85,0.05,0.45);
          shard.aimAngle=lerpAngle(manAngle,autoAngle,assistStr);
        }else shard.aimAngle=manAngle;
      }else shard.aimAngle=manAngle;
    }
    return;
  }
  if(controls.move.active&&e.pointerId===controls.move.pid){
    controls.move.rawX=x;controls.move.rawY=y;
    shard.x=clamp(x,shard.radius+2,W-shard.radius-2);
    shard.y=clamp(y,shard.radius+2,H-shard.radius-2);
  }
}
function onPU(e){
  e.preventDefault();
  delete ptrs[e.pointerId];
  if(controls.aim.active&&e.pointerId===controls.aim.pid){
    controls.aim.active=false;controls.aim.pid=null;controls.aim.dx=0;controls.aim.dy=0;
    shard.aimLocked=false;shard.autoAimGrace=0.25;
  }
  if(controls.move.active&&e.pointerId===controls.move.pid){
    controls.move.active=false;controls.move.pid=null;shard.isDragged=false;
  }
}

function manualFireImmediate(){if(state!==S.PLAY)return;doFireShot(shard.x,shard.y,shard.aimAngle);tone(720,.04,'square',.07);}
function spawnGhost(){upg.ghostActive=true;upg.ghostLife=8;upg.ghostX=shard.x+(rng()-.5)*120;upg.ghostY=shard.y+(rng()-.5)*120;}

function nearestEnemy(x,y){let best=null,bd=Infinity;enemies.forEach(e=>{if(e._rm)return;const d=dist(x,y,e.x,e.y);if(d<bd){bd=d;best=e;}});return best;}
function enemyInCone(x,y,angle,half,maxD){
  return enemies.some(en=>{
    if(en._rm)return false;
    const dx=en.x-x,dy=en.y-y,d=Math.hypot(dx,dy);
    if(d>maxD)return false;
    const a=Math.atan2(dy,dx);let da=Math.abs(a-angle);
    if(da>Math.PI)da=Math.PI*2-da;return da<half;
  });
}

// ═══════════════════════════════════════════════════════════════════════
// MAIN UPDATE
// ═══════════════════════════════════════════════════════════════════════
const FIXED_DT=1/120;
let accumulator=0;

function update(dt){
  if(state!==S.PLAY) return;
  elapsed+=dt; waveStage=Math.floor(elapsed/30);
  if(shake.t>0){shake.t-=dt;if(shake.t<=0){shake.x=0;shake.y=0;}}

  // Combo decay
  if(comboTimer>0) comboTimer-=dt;
  else if(elapsed-lastKillTime>2.0) combo=Math.max(1,combo-dt*0.5);

  // Safety valve (tower < 20%)
  if(tower.hp<tower.maxHp*0.20) safetyValveTimer=10;
  if(safetyValveTimer>0) safetyValveTimer-=dt;

  // Keyboard
  const km=220*dt;
  if(keys['KeyW']||keys['ArrowUp'])    shard.y=clamp(shard.y-km,shard.radius,H-shard.radius);
  if(keys['KeyS']||keys['ArrowDown'])  shard.y=clamp(shard.y+km,shard.radius,H-shard.radius);
  if(keys['KeyA']||keys['ArrowLeft'])  shard.x=clamp(shard.x-km,shard.radius,W-shard.radius);
  if(keys['KeyD']||keys['ArrowRight']) shard.x=clamp(shard.x+km,shard.radius,W-shard.radius);

  // Overdrive
  if(shard.overdriveMode){shard.overdriveTimer-=dt;if(shard.overdriveTimer<=0)shard.overdriveMode=false;}

  // Shield regen
  if(shard.shieldHp===0&&shard.shieldRegenTime>0){
    shard.shieldRegenTimer+=dt;
    if(shard.shieldRegenTimer>=shard.shieldRegenTime){shard.shieldHp=1;shard.shieldRegenTimer=0;tone(440,.3,'sine',.1);}
  }

  // Trail
  shard.trailX.unshift(shard.x);shard.trailY.unshift(shard.y);
  if(shard.trailX.length>20){shard.trailX.pop();shard.trailY.pop();}
  if(shard.hasPlasmaTrail){
    enemies.forEach(en=>{
      if(en._rm||en.bodyHitCd>0) return;
      for(let i=0;i<Math.min(8,shard.trailX.length);i++){
        if(dist(en.x,en.y,shard.trailX[i],shard.trailY[i])<shard.radius*0.9){
          hitEnemy(en,.25*shard.trailDmgMult,false);
          en.bodyHitCd=0.35; break;
        }
      }
    });
  }

  // Pulse
  if(pulse.cd>0) pulse.cd=Math.max(0,pulse.cd-dt);
  pulse.rings.forEach(ring=>{
    ring.r+=ring.speed*dt;
    enemies.forEach(en=>{
      if(en._rm||ring.hitSet.has(en.id))return;
      const d=dist(en.x,en.y,towerX,towerY);
      if(Math.abs(d-ring.r)<=en.radius+PULSE_RING_THICKNESS){
        ring.hitSet.add(en.id);
        const nx=(en.x-towerX)/(d||1),ny=(en.y-towerY)/(d||1);
        const anchorMult=en.anchored?0.08:1;
        const sentMult=en.type==='sentinelBrute'?0.1:1;
        const impulse=(PULSE_BASE_FORCE/(en.mass||1))*anchorMult*sentMult;
        en.vx+=nx*impulse;en.vy+=ny*impulse;
        // Pulse does more damage to shields
        if(en.shieldHp>0){en.shieldHp=0;spawnImpact(en.x,en.y,'#88eeff');}
        else hitEnemy(en,2.0+en.mass*0.45,true);
        spawnPlasmaExplosion(en.x,en.y,en.color);
      }
    });
  });
  pulse.rings=pulse.rings.filter(r=>r.r<r.maxR);

  // Auto-aim
  if(shard.autoAimGrace>0) shard.autoAimGrace-=dt;
  if(!shard.aimLocked&&shard.autoAimGrace<=0){
    const ne=nearestEnemy(shard.x,shard.y);
    if(ne) shard.aimAngle=Math.atan2(ne.y-shard.y,ne.x-shard.x);
  }

  // Firing
  shard.fireCooldown-=dt;
  const holdFire=controls.aim.active;
  if(shard.fireCooldown<=0){
    if(holdFire){
      doFireShot(shard.x,shard.y,shard.aimAngle);
      shard.fireCooldown=Math.max(.05,shard.fireRate*upg.fireRate*0.30);
      tone(700,.035,'square',.055);
    }else{
      const hasTarget=shard.aimLocked||enemyInCone(shard.x,shard.y,shard.aimAngle,Math.PI*65/180,370);
      if(hasTarget){doFireShot(shard.x,shard.y,shard.aimAngle);shard.fireCooldown=shard.fireRate*upg.fireRate;tone(680,.04,'square',.055);}
      else shard.fireCooldown=.08;
    }
  }

  // Ghost
  if(upg.ghostActive){
    upg.ghostLife-=dt;
    if(upg.ghostLife<=0) upg.ghostActive=false;
    else{
      upg.ghostX=lerp(upg.ghostX,towerX+Math.cos(elapsed*.9)*Math.min(W,H)*.25,.05);
      upg.ghostY=lerp(upg.ghostY,towerY+Math.sin(elapsed*1.2)*Math.min(W,H)*.16,.05);
      const gt=nearestEnemy(upg.ghostX,upg.ghostY);
      if(gt&&shard.fireCooldown<.02) fireDart(upg.ghostX,upg.ghostY,Math.atan2(gt.y-upg.ghostY,gt.x-upg.ghostX));
    }
  }

  // Count danger near tower for pacing
  dangerNearTowerCount=enemies.filter(e=>!e._rm&&dist(e.x,e.y,towerX,towerY)<Math.min(W,H)*0.28).length;

  // Enemy update
  enemies.forEach(en=>{if(!en._rm) updateEnemy(en,dt);});
  enemies.forEach(en=>{if(!en._rm) shardBump(en,shard.x,shard.y);});
  if(upg.ghostActive) enemies.forEach(en=>{if(!en._rm) shardBump(en,upg.ghostX,upg.ghostY);});
  enemies=enemies.filter(e=>!e._rm);

  // Tower
  if(tower.hitFlash>0) tower.hitFlash-=dt;
  if(tower.healGlow>0) tower.healGlow-=dt;
  tower.regenTimer+=dt;
  if(tower.regenTimer>=4&&tower.hp<tower.maxHp){tower.hp=Math.min(tower.maxHp,tower.hp+0.04);tower.regenTimer=0;}

  // Projectiles
  projectiles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;});
  projectiles=projectiles.filter(p=>p.life>0&&!p.dead);
  projectiles.forEach(p=>{
    if(p.dead)return;
    enemies.forEach(en=>{
      if(p.dead||en._rm)return;
      if(dist(p.x,p.y,en.x,en.y)<en.radius+5){
        hitEnemy(en,1,true);
        if(!upg.pierce||p.pierced) p.dead=true; else p.pierced=true;
      }
    });
  });
  projectiles=projectiles.filter(p=>!p.dead);

  // DIRECTOR + PACING update
  recentKills=recentKills.filter(t=>elapsed-t<10);
  const killsPer10s=recentKills.length;
  const scorePer10=score-recentScoreSnap;
  if(elapsed%10<dt){recentScoreSnap=score;}

  // Pacing: fodder pack if low kills + low danger
  if(elapsed>20&&killsPer10s<3&&dangerNearTowerCount<2&&rng()<0.015){
    spawnFodderPack();
  }
  // Pack spawn variance: escort pack at intervals
  if(elapsed>90&&rng()<0.0015) spawnEscortPack();

  // Pacing boost: reduce spawn interval if score lagging
  if(elapsed>30&&scorePer10<12){pacingBoost=true;pacingBoostTimer=8;}
  if(pacingBoostTimer>0){pacingBoostTimer-=dt;if(pacingBoostTimer<=0)pacingBoost=false;}

  // Spawn timer
  spawnTimer-=dt;
  if(spawnTimer<=0){spawnEnemy();spawnTimer=getSpawnInterval();}

  // Boss event timer
  if(bossBannerTimer>0){bossBannerTimer-=dt;if(bossBannerTimer<=0)document.getElementById('boss-banner').classList.add('hidden');}
  if(bossActive){
    bossTimer-=dt;
    if(bossSpawnTimer>0){
      bossSpawnTimer-=dt;
      if(bossSpawnTimer<=0){
        // Spawn boss exactly once per event (only if no boss currently alive)
        if(!enemies.some(e=>e.isBoss&&!e._rm)){
          const idx=bossEventsTriggered.size-1;
          spawnBoss(idx);
        }
        bossSpawnTimer=-1; // sentinel: already spawned this event
      }
    }
    if(bossTimer<=0) bossActive=false;
  }

  // Particles
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=28*dt;p.vx*=.97;p.life-=dt;});
  particles=particles.filter(p=>p.life>0);
  if(particles.length>240) particles.splice(0,particles.length-240);
}

let _posterUrl=null,_snideText='';
function generatePoster(){
  const snide=SNIDE[Math.floor(rng()*SNIDE.length)];_snideText=snide;
  const oc=document.createElement('canvas');oc.width=1080;oc.height=1920;
  const c=oc.getContext('2d');
  const t=T();const bgs=t.bgColors;
  const g=c.createLinearGradient(0,0,0,1920);
  g.addColorStop(0,bgs[Math.min(bgPhase,bgs.length-1)][0]);
  g.addColorStop(1,bgs[Math.min(bgPhase,bgs.length-1)][2]||bgs[0][2]);
  c.fillStyle=g;c.fillRect(0,0,1080,1920);
  c.strokeStyle='rgba(255,255,255,.05)';c.lineWidth=1;
  for(let x=0;x<1080;x+=60){c.beginPath();c.moveTo(x,0);c.lineTo(x,1920);c.stroke();}

  c.strokeStyle='rgba(255,255,255,.2)';c.lineWidth=1;c.beginPath();c.moveTo(120,330);c.lineTo(960,330);c.stroke();
  c.font='bold 150px Orbitron,sans-serif';c.fillStyle='#fff';c.shadowColor=t.accent;c.shadowBlur=36;
  c.fillText(lastFinalScore.toString(),540,540);c.shadowBlur=0;
  c.font='46px Share Tech Mono,monospace';c.fillStyle='#8ab8cc';c.fillText(formatTime(lastFinalTime)+' SURVIVED',540,625);
  c.save();c.translate(540,960);c.strokeStyle=t.shipGlow+'cc';c.lineWidth=4;c.shadowColor=t.shipGlow;c.shadowBlur=18;
  const sr=86;c.beginPath();c.arc(0,0,sr*.72,0,Math.PI*2);c.stroke();
  c.beginPath();c.moveTo(0,sr*.72);c.lineTo(0,-sr*1.6);c.stroke();
  c.beginPath();c.moveTo(0,-sr*1.6);c.lineTo(-sr*.36,-sr*1.04);c.moveTo(0,-sr*1.6);c.lineTo(sr*.36,-sr*1.04);c.stroke();c.restore();
  c.font='italic 36px Georgia,serif';c.fillStyle='rgba(180,200,215,.9)';c.shadowBlur=0;
  const ws=snide.split(' '),mW=820;let ln='',lns=[];

  lns.forEach((l,i)=>c.fillText(l,540,1450+i*50));
  c.font='24px Orbitron,sans-serif';c.fillStyle='rgba(0,229,255,.35)';c.fillText('PLASMA SHEET DEFENSE',540,1875);
  return oc.toDataURL('image/png');

// ═══════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════
let plasmaT=0;
let recentScoreSnap=0;

function render(){
  ctx.setTransform(DPR,0,0,DPR,shake.x,shake.y);
  ctx.clearRect(-2,-2,W+4,H+4);
  plasmaT+=0.014;
  const th=T();
  const ph=Math.min(bgPhase,th.bgColors.length-1);
  const [c0,c1,c2]=th.bgColors[ph];

  // Background
  const bg=ctx.createRadialGradient(CX,H*.4,0,CX,H*.4,Math.max(W,H)*.9);
  bg.addColorStop(0,c0);bg.addColorStop(.55,c1||c0);bg.addColorStop(1,c2||c1||c0);
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Overlay pulse tint
  if(bgPhase>0){
    ctx.save();
    ctx.globalAlpha=(.45+Math.sin(plasmaT*2)*.35)*.3;
    ctx.fillStyle=th.accent+'55';ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // Animated grid
  ctx.save();ctx.globalAlpha=.05;ctx.strokeStyle=th.gridColor;ctx.lineWidth=.5;
  for(let gx=0;gx<W;gx+=60){ctx.beginPath();ctx.moveTo(gx+Math.sin(plasmaT+gx*.01)*2.5,0);ctx.lineTo(gx+Math.sin(plasmaT+gx*.01)*2.5,H);ctx.stroke();}
  for(let gy=0;gy<H;gy+=60){ctx.beginPath();ctx.moveTo(0,gy+Math.sin(plasmaT*.8+gy*.01)*2.5);ctx.lineTo(W,gy+Math.sin(plasmaT*.8+gy*.01)*2.5);ctx.stroke();}
  ctx.restore();

  // Range rings
  ctx.save();ctx.strokeStyle='rgba(0,180,255,.07)';ctx.lineWidth=1;ctx.setLineDash([4,8]);
  [.28,.48,.68].forEach(f=>{ctx.beginPath();ctx.arc(towerX,towerY,Math.min(W,H)*f,0,Math.PI*2);ctx.stroke();});
  ctx.setLineDash([]);ctx.restore();

  // Pulse rings
  pulse.rings.forEach(ring=>{
    const a=1-ring.r/ring.maxR;
    ctx.save();
    ctx.strokeStyle=th.pulseColor+`${a*.65})`;ctx.lineWidth=3*a+.5;
    ctx.shadowColor=th.accent;ctx.shadowBlur=14*a;
    ctx.beginPath();ctx.arc(towerX,towerY,ring.r,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  });

  // Healer aura visuals
  enemies.forEach(en=>{
    if(!en._rm&&en.healAura){
      ctx.save();ctx.globalAlpha=.08+Math.sin(plasmaT*3)*.04;
      const ag=ctx.createRadialGradient(en.x,en.y,0,en.x,en.y,100);
      ag.addColorStop(0,'#44ff88');ag.addColorStop(1,'transparent');
      ctx.fillStyle=ag;ctx.beginPath();ctx.arc(en.x,en.y,100,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  });

  drawTower();
  enemies.forEach(en=>{if(!en._rm) drawEnemy(en);});

  // Plasma trail
  if(shard.hasPlasmaTrail&&shard.trailX.length>1){
    ctx.save();
    for(let i=1;i<shard.trailX.length;i++){
      ctx.globalAlpha=(1-i/shard.trailX.length)*.48;
      ctx.strokeStyle=th.accent;ctx.lineWidth=shard.radius*.5*(1-i/shard.trailX.length);
      ctx.shadowColor=th.accent;ctx.shadowBlur=7;
      ctx.beginPath();ctx.moveTo(shard.trailX[i-1],shard.trailY[i-1]);ctx.lineTo(shard.trailX[i],shard.trailY[i]);ctx.stroke();
    }
    ctx.restore();
  }

  // Slow aura
  if(upg.slowAura){
    ctx.save();ctx.globalAlpha=.11;
    const sg=ctx.createRadialGradient(shard.x,shard.y,0,shard.x,shard.y,82+shard.radius);
    sg.addColorStop(0,th.accent);sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(shard.x,shard.y,82+shard.radius,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Ghost
  if(upg.ghostActive&&upg.ghostLife>0) drawShipAt(upg.ghostX,upg.ghostY,shard.aimAngle,clamp(upg.ghostLife/8,0,1)*.4);

  drawAimLine();
  drawShipAt(shard.x,shard.y,shard.aimAngle,1);

  // Thumb ring
  if(shard.isDragged&&controls.move.active){
    const rx=controls.move.rawX,ry=controls.move.rawY;
    ctx.save();
    ctx.shadowBlur=20;ctx.shadowColor=th.accent+'cc';ctx.strokeStyle=th.accent+'b0';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(rx,ry,26,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=8;ctx.strokeStyle=th.accent+'33';ctx.lineWidth=8;
    ctx.beginPath();ctx.arc(rx,ry,26,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }

  // Projectiles
  const tc=getTierColor();
  projectiles.forEach(p=>{
    ctx.save();
    const angle=Math.atan2(p.vy,p.vx);ctx.translate(p.x,p.y);ctx.rotate(angle);
    ctx.globalAlpha=.32;ctx.strokeStyle=tc;ctx.lineWidth=1.5+upg.projTier*.35;
    ctx.shadowColor=tc;ctx.shadowBlur=6;
    ctx.beginPath();ctx.moveTo(-20-upg.projTier*3,0);ctx.lineTo(0,0);ctx.stroke();
    ctx.globalAlpha=1;ctx.shadowBlur=9+upg.projTier*3;ctx.shadowColor=tc;ctx.fillStyle=tc;
    ctx.beginPath();ctx.moveTo(11+upg.projTier,0);ctx.lineTo(-4,2.5+upg.projTier*.5);ctx.lineTo(-4,-2.5-upg.projTier*.5);ctx.closePath();ctx.fill();
    ctx.restore();
  });

  // Particles
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=clamp(p.life*2.5,0,1);
    if(p.type==='flash'){ctx.shadowBlur=26;ctx.shadowColor=p.color;ctx.fillStyle=p.color;ctx.globalAlpha*=.5;ctx.beginPath();ctx.arc(p.x,p.y,p.size*(1-p.life*.5+.1),0,Math.PI*2);ctx.fill();}
    else if(p.type==='glow'){ctx.shadowBlur=13;ctx.shadowColor=p.color;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2);ctx.fill();}
    else if(p.type==='rect'){ctx.translate(p.x,p.y);ctx.rotate(p.rot+p.life*4);ctx.shadowBlur=7;ctx.shadowColor=p.color;ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/3,p.size,p.size*.5);}
    else{ctx.shadowBlur=4;ctx.shadowColor=p.color;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  });

  drawControls();
  drawHUD();

  // Pulse button ready / not-ready visual
  const pReady=pulse.cd<=0;
  const th2=T();
  pulseBtn.style.opacity=pReady?'1':'0.35';
  pulseBtn.style.borderColor=pReady?th2.accent:'rgba(100,100,120,0.5)';
  pulseBtn.style.boxShadow=pReady?`0 0 16px rgba(${th2.accentRgb},.7)`:'none';
  pulseBtn.style.color=pReady?th2.accent:'rgba(140,140,160,0.7)';
}

function drawTower(){
  ctx.save();
  const flash=tower.hitFlash>0?tower.hitFlash/.3:0,heal=tower.healGlow;
  const ps=1+Math.sin(elapsed*4)*.03;
  const th=T();
  const colors=th.towerColors;
  [28,20,13,7].forEach((r,i)=>{
    ctx.beginPath();ctx.arc(towerX,towerY,r*ps,0,Math.PI*2);
    ctx.fillStyle=flash>0?`rgba(255,60,120,${.4+flash*.5})`:heal>0?`rgba(0,255,153,${.18+heal*.28})`:colors[i]||'#1a0840';
    ctx.shadowBlur=flash>0?18:heal>0?13:9;
    ctx.shadowColor=flash>0?'#ff3c78':heal>0?'#00ff99':'#6622cc';
    ctx.fill();ctx.strokeStyle='rgba(100,60,255,.35)';ctx.lineWidth=1;ctx.stroke();
  });
  const hf=tower.hp/tower.maxHp;
  ctx.shadowBlur=7;ctx.strokeStyle=hf>.5?'#00ffaa':hf>.25?'#ffaa00':'#ff3333';ctx.shadowColor=ctx.strokeStyle;
  ctx.lineWidth=3.5;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(towerX,towerY,33,-Math.PI/2,-Math.PI/2+Math.PI*2*hf);ctx.stroke();
  ctx.restore();
}

function drawShipAt(x,y,angle,alpha){
  ctx.save();ctx.globalAlpha=alpha;ctx.translate(x,y);ctx.rotate(angle+Math.PI/2);
  const r=shard.radius,od=shard.overdriveMode;
  const th=T();
  const gc=od?'#ff4400':th.shipGlow,cc=od?'#ffaa00':th.shipCore;
  ctx.save();
  const bl=ctx.createRadialGradient(0,0,r*.3,0,0,r*1.8);
  bl.addColorStop(0,od?'rgba(255,100,0,.13)':gc+'1c');bl.addColorStop(1,'transparent');
  ctx.fillStyle=bl;ctx.beginPath();ctx.arc(0,0,r*1.8,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.save();ctx.shadowBlur=13;ctx.shadowColor=gc;ctx.strokeStyle=gc;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(0,0,r*.72,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=.38;ctx.strokeStyle=cc;ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(0,0,r*.52,0,Math.PI*2);ctx.stroke();ctx.restore();
  ctx.save();ctx.shadowBlur=15;ctx.shadowColor=gc;ctx.strokeStyle=gc;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(0,r*.72);ctx.lineTo(0,-r*1.6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-r*1.6);ctx.lineTo(-r*.37,-r*1.04);ctx.moveTo(0,-r*1.6);ctx.lineTo(r*.37,-r*1.04);ctx.stroke();
  ctx.globalAlpha=.65;ctx.beginPath();ctx.moveTo(-r*.72,0);ctx.lineTo(-r*.45,r*.6);ctx.moveTo(r*.72,0);ctx.lineTo(r*.45,r*.6);ctx.stroke();ctx.restore();
  ctx.save();
  const og=ctx.createRadialGradient(0,0,0,0,0,r*.38);
  og.addColorStop(0,'#fff');og.addColorStop(.4,cc);og.addColorStop(1,'transparent');
  ctx.shadowBlur=18;ctx.shadowColor=cc;ctx.fillStyle=og;
  ctx.beginPath();ctx.arc(0,0,r*.38,0,Math.PI*2);ctx.fill();ctx.restore();
  if(shard.shieldHp>0){ctx.save();ctx.strokeStyle='rgba(100,200,255,.72)';ctx.lineWidth=3;ctx.shadowBlur=16;ctx.shadowColor='#88ddff';ctx.beginPath();ctx.arc(0,0,r+8,0,Math.PI*2);ctx.stroke();ctx.restore();}
  ctx.restore();
}

function drawEnemy(en){
  ctx.save();ctx.translate(en.x,en.y);
  const r=en.radius;
  if(en.stunTimer>0||en.hitTimer>0){const s=1+Math.sin(en.hitTimer*30)*.1;ctx.scale(s,1/s);}
  if(en.teleportGlow>0){ctx.shadowBlur=28*en.teleportGlow;ctx.shadowColor='#aa00ff';}
  ctx.rotate(en.wobble*.05+elapsed*(en.type==='bruteNgon'||en.type==='anchored'||en.type==='sentinelBrute'?.35:en.type==='skitter'?2:en.type==='spiralHunter'?(1.1+(1-clamp(en.hp/en.maxHp,0,1))*2.2):0.8));

  // SpiralHunter — extra glow ring that brightens when enraged
  if(en.type==='spiralHunter'){
    const enrT=1-clamp(en.hp/en.maxHp,0,1);
    ctx.save();
    ctx.strokeStyle=`rgba(255,80,255,${0.25+enrT*0.45})`;
    ctx.lineWidth=1.5+enrT*1.5;
    ctx.shadowBlur=14+enrT*18; ctx.shadowColor='#ff55ff';
    ctx.beginPath();ctx.arc(0,0,r*1.45,0,Math.PI*2);ctx.stroke();
    ctx.restore();
    ctx.shadowBlur=14+enrT*12; ctx.shadowColor='#ff55ff';
  }
  if(en.anchored){
    ctx.save();ctx.strokeStyle=en.color+'88';ctx.lineWidth=1;ctx.shadowBlur=10;ctx.shadowColor=en.color;
    ctx.setLineDash([3,5]);
    ctx.beginPath();ctx.arc(0,0,r*1.5,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
  }

  ctx.shadowBlur=12;ctx.shadowColor=en.color;ctx.fillStyle=en.color;
  drawEPath(en);ctx.fill();
  ctx.strokeStyle=en.isBoss?'rgba(255,255,255,.38)':'rgba(255,255,255,.18)';ctx.lineWidth=en.isBoss?2.5:1;ctx.stroke();

  // Shield shell
  if(en.shieldHp>0){
    ctx.save();
    const shieldA=.3+.3*(en.shieldHp/Math.max(en.shieldMax,1));
    ctx.strokeStyle=`rgba(100,220,255,${shieldA})`;ctx.lineWidth=3;ctx.shadowBlur=14;ctx.shadowColor='#44ddff';
    ctx.beginPath();ctx.arc(0,0,r+6+Math.sin(elapsed*4)*2,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }

  // HP bar
  if(en.hp<en.maxHp){
    const bw=r*2.4;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(-bw/2,-r-9,bw,4);
    ctx.fillStyle=en.color;ctx.fillRect(-bw/2,-r-9,bw*(en.hp/en.maxHp),4);
  }

  // Skin label in theme (optional, tiny)
  if(T().enemySkin[en.type]){
    ctx.save();ctx.globalAlpha=.5;ctx.font=`${Math.floor(r*.6)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillText(getSkinGlyph(en.type),0,0);ctx.restore();
  }
  ctx.restore();
}

function getSkinGlyph(type){
  const mcdo={runner:'🍟',splitter:'🍗',tank:'🍔',skitter:'🥡',dodger:'🥫',bruteNgon:'🍔',anchored:'🍖',shielded:'🥤',exploder:'🍅',healer:'🎁'};
  const space={runner:'▲',splitter:'●',tank:'⬡',skitter:'▸',dodger:'◁',bruteNgon:'⬟',anchored:'⊕',shielded:'◯',exploder:'💥',healer:'⊛'};
  const anime={runner:'⚡',splitter:'💥',tank:'🥫',skitter:'⚡',dodger:'👻',bruteNgon:'🥫',anchored:'🧊',shielded:'🔮',exploder:'💣',healer:'💉'};
  if(currentThemeId==='mcdo') return mcdo[type]||'';
  if(currentThemeId==='spacetech') return space[type]||'';
  if(currentThemeId==='anime') return anime[type]||'';
  return '';
}

function drawEPath(en){
  const r=en.radius,s=en.shape;
  ctx.beginPath();
  if(s==='ngon'){
    const n=en.sides||6;
    for(let i=0;i<n;i++){const a=i/n*Math.PI*2-Math.PI/n;i?ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r):ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.closePath();
  }else if(s==='tri'){ctx.moveTo(0,-r*1.2);ctx.lineTo(r,r*.7);ctx.lineTo(-r,r*.7);ctx.closePath();}
  else if(s==='hex'){for(let i=0;i<6;i++){const a=i/6*Math.PI*2-Math.PI/6;i?ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r):ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();}
  else if(s==='circ'){ctx.arc(0,0,r,0,Math.PI*1.82);ctx.lineTo(0,0);ctx.closePath();}
  else if(s==='diamond'){ctx.moveTo(0,-r*1.3);ctx.lineTo(r*.7,0);ctx.lineTo(0,r*1.3);ctx.lineTo(-r*.7,0);ctx.closePath();}
}

function drawControls(){
  if(state!==S.PLAY&&state!==S.PAUSE) return;
  const th=T();
  ctx.save();ctx.globalAlpha=.13;ctx.fillStyle=th.accent;
  ctx.beginPath();ctx.arc(controls.aim.x,controls.aim.y,controls.aim.r,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=.28;ctx.strokeStyle=th.accent;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(controls.aim.x,controls.aim.y,controls.aim.r,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=.4;ctx.fillStyle=th.accent;
  ctx.font=`${clamp(W*.02,8,12)}px ${th.hudFont}`;ctx.textAlign='center';
  ctx.fillText('AIM/FIRE',controls.aim.x,controls.aim.y+controls.aim.r+15);
  ctx.shadowBlur=11;ctx.shadowColor=th.accent;ctx.fillStyle=th.accent+'88';
  ctx.beginPath();ctx.arc(controls.aim.x+controls.aim.dx,controls.aim.y+controls.aim.dy,controls.aim.r*.35,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawAimLine(){
  const len=56+Math.sin(elapsed*6)*4;
  const ax=shard.x+Math.cos(shard.aimAngle)*len,ay=shard.y+Math.sin(shard.aimAngle)*len;
  const th=T();
  ctx.save();
  ctx.strokeStyle=shard.aimLocked?'rgba(255,60,120,.6)':th.accent+'55';
  ctx.lineWidth=1.5;ctx.setLineDash([5,5]);ctx.lineDashOffset=-elapsed*14;
  ctx.shadowColor=shard.aimLocked?'#ff3c78':th.accent;ctx.shadowBlur=4;
  ctx.beginPath();ctx.moveTo(shard.x,shard.y);ctx.lineTo(ax,ay);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=shard.aimLocked?'rgba(255,60,120,.8)':th.accent+'bb';
  ctx.translate(ax,ay);ctx.rotate(shard.aimAngle);
  ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(-3,4);ctx.lineTo(-3,-4);ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawHUD(){
  const fnt=T().hudFont||'Orbitron,sans-serif';
  const acc=T().accent;
  ctx.save();
  ctx.font=`bold ${clamp(W*.04,17,27)}px ${fnt}`;
  ctx.shadowColor=acc;ctx.shadowBlur=11;ctx.fillStyle=acc;
  ctx.fillText(score,20,36);
  if(combo>1.05){
    ctx.font=`${clamp(W*.024,10,15)}px ${fnt}`;ctx.fillStyle='#ffee00';ctx.shadowColor='#ffee00';ctx.shadowBlur=9;
    ctx.fillText(`×${combo.toFixed(1)}`,20,54);
  }
  ctx.restore();
  ctx.save();
  ctx.font=`${clamp(W*.026,11,17)}px ${fnt}`;ctx.fillStyle=acc+'b0';ctx.textAlign='right';
  const m=Math.floor(elapsed/60),sec=Math.floor(elapsed%60).toString().padStart(2,'0');
  ctx.fillText(`${m}:${sec}`,W-16,30);
  ctx.font=`${clamp(W*.02,9,13)}px ${fnt}`;ctx.fillStyle=acc+'80';
  ctx.fillText(`WAVE ${waveStage+1}`,W-16,44);
  ctx.textAlign='left';ctx.restore();

  // Next milestone bar
  let nextMs=-1,prevMs=0;
  for(let i=0;i<MILESTONES.length;i++){if(!milestonesHit.has(i)){nextMs=MILESTONES[i];prevMs=i>0?MILESTONES[i-1]:0;break;}}
  if(nextMs>0){
    const bw=clamp(W*.2,110,190),bh=5,bx=20,by=64;
    const prog=clamp((score-prevMs)/(nextMs-prevMs),0,1);
    ctx.save();
    ctx.fillStyle=acc+'18';ctx.fillRect(bx,by,bw,bh);
    ctx.shadowColor=acc;ctx.shadowBlur=5;ctx.fillStyle=acc;ctx.fillRect(bx,by,bw*prog,bh);
    ctx.font=`${clamp(W*.017,7,10)}px ${fnt}`;ctx.fillStyle=acc+'80';
    ctx.fillText(`NEXT: ${nextMs}`,bx,by+15);
    ctx.restore();
  }

  // Upgrade flash
  if(upgradeFlash.timer>0){
    const a=clamp(upgradeFlash.timer,0,1);
    ctx.save();ctx.globalAlpha=a;ctx.font=`bold ${clamp(W*.03,11,19)}px ${fnt}`;
    ctx.textAlign='center';ctx.shadowColor='#00ff99';ctx.shadowBlur=14;ctx.fillStyle='#00ff99';
    ctx.fillText('⬡  '+upgradeFlash.text+'  ⬡',CX,H*.1);
    ctx.restore();upgradeFlash.timer-=1/60;
  }

  // Pulse CD arc
  const maxCd=pulse.maxCd*upg.pulseCdMult,frac=pulse.cd/maxCd;
  if(frac>0){
    ctx.save();ctx.shadowBlur=7;ctx.shadowColor=acc;ctx.strokeStyle=acc+'cc';ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(18+28,18+28,24,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-frac));ctx.stroke();
    ctx.restore();
  }

  // Phase indicator + theme label
  if(bgPhase>0||currentThemeId!=='default'){
    ctx.save();ctx.font=`${clamp(W*.016,6,10)}px ${fnt}`;ctx.fillStyle=acc+'44';ctx.textAlign='right';
    ctx.fillText(`PHASE ${bgPhase} · ${T().name}`,W-16,H-10);ctx.textAlign='left';ctx.restore();
  }

  // Shield bar
  if(shard.shieldHp===0&&shard.shieldRegenTime>0){
    const prog=clamp(shard.shieldRegenTimer/shard.shieldRegenTime,0,1);
    const bw=clamp(W*.13,75,115);
    ctx.save();
    ctx.fillStyle='rgba(80,160,255,.1)';ctx.fillRect(20,H-28,bw,4);
    ctx.fillStyle='rgba(80,160,255,.48)';ctx.fillRect(20,H-28,bw*prog,4);
    ctx.font=`${clamp(W*.015,6,9)}px ${fnt}`;ctx.fillStyle='rgba(100,200,255,.42)';ctx.fillText('SHIELD',20,H-32);
    ctx.restore();
  }

  // Shot/tier display
  if(upg.shotCount>1||upg.projTier>1){
    ctx.save();ctx.font=`${clamp(W*.016,6,10)}px ${fnt}`;ctx.fillStyle=getTierColor()+'99';
    ctx.fillText(`×${upg.shotCount} T${upg.projTier}`,20,H-10);ctx.restore();
  }

  // Danger indicator
  if(dangerNearTowerCount>3){
    ctx.save();ctx.globalAlpha=.45+Math.sin(elapsed*8)*.25;
    ctx.font=`${clamp(W*.022,9,14)}px ${fnt}`;ctx.textAlign='center';ctx.fillStyle='#ff3333';ctx.shadowColor='#ff3333';ctx.shadowBlur=10;
    ctx.fillText('⚠ TOWER UNDER ATTACK',CX,H*.06);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════════════════════════════════
let lastT=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  if(state===S.PLAY){accumulator+=dt;while(accumulator>=FIXED_DT){update(FIXED_DT);accumulator-=FIXED_DT;}}
  render();
}
// ─── INIT ───
applyResize();
setTheme('default');
requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
</script>
